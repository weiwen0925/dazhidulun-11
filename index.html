.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;background:rgba(30,26,20,.92);color:var(--gold);padding:8px 22px;border-radius:30px;border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* Back top */
#backTop{display:none;position:fixed;right:24px;bottom:70px;width:44px;height:44px;border-radius:50%;background:var(--sbBg);color:var(--goldL);border:1px solid var(--gold);font-size:20px;cursor:pointer;z-index:105;box-shadow:0 4px 12px rgba(0,0,0,.25);}

/* Footer */
.site-footer{margin-top:60px;padding:34px 30px;background:var(--sbBg);color:#d4c4a8;text-align:center;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12.5px;letter-spacing:2px;line-height:2;}
.site-footer .foot-sep{color:var(--gold);margin:0 8px;}

/* p indent */
.p-indent{text-indent:2em;}
.p-indent-3{text-indent:3em;}

/* responsive */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:.3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .site-hero{padding:60px 20px 48px;}
  .site-hero h1{font-size:34px;letter-spacing:6px;}
  .ch-head{padding:36px 20px;}
  .ch-name{font-size:24px;letter-spacing:4px;}
  .ch-body{padding:26px 18px;}
  .two-col,.four-grid,.three-col{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:15.5px;}
  .site-hero h1{font-size:28px;letter-spacing:4px;}
  .ch-body h2{font-size:19px;letter-spacing:2px;}
}

html,body{margin:0;padding:0;background:transparent;
  overflow-x:hidden!important;overflow-y:hidden!important;
  max-width:100vw!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;
  font-style:normal!important;
  box-sizing:border-box!important;}
body{padding:0 6px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img,video,iframe,table{max-width:100%!important;height:auto;}
img{-webkit-user-drag:none!important;pointer-events:none;}
.ch-body{background:var(--bg,#f7f3ec)!important;max-width:100%!important;margin:0 auto!important;}
/* 防止橫向溢位：所有區塊以中文逐字斷行為原則 */
.ch-body, .ch-body *{max-width:100%!important;}
p, li, div, span, td, th, h1, h2, h3, h4, h5, h6, a,
.card, .col, .flow, .note, .gatha, .verse, .inner-toc,
.insight, .commentary, .practice, .metaphor, .quote,
.classical-text, .section-content, .bridge, .callout, .highlight{
  overflow-wrap:break-word!important;
  word-break:break-word!important;
}
pre, code{white-space:pre-wrap!important;word-break:break-all!important;}
table{table-layout:fixed!important;width:100%!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}
.toc-section, .toc{background:transparent!important;}
.card,.col,.flow,.compare-table,.insight,.commentary,.practice,.metaphor,.note{background:var(--card,#fffdf7)!important;}
/* 注意：不要覆寫 .card-title / .col-title / .text-label 顏色。
   這類元素在多數來源檔中是有色底 + 白字膠囊，任意改字色會造成底字同色看不清。 */
/* 加大正文字級，降低長時間閱讀疲勞 */
html,body{font-size:19px!important;line-height:1.95!important;}
.ch-body, .ch-body p, .ch-body li{font-size:19px!important;line-height:2!important;}
.ch-body h2{font-size:23px!important;line-height:1.7!important;}
.ch-body h3{font-size:19.5px!important;line-height:1.7!important;}
.ch-body h4{font-size:18px!important;}
.card-content,.col-content,.section-content,
.card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
.classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
  font-size:19px!important;line-height:2!important;
}
.gatha,.verse,.verse p{font-size:20.5px!important;line-height:2.2!important;}
.qa .q, .qa .a, .qa-2, .qa-3{font-size:19px!important;line-height:2!important;}
.inner-toc ol li{font-size:16px!important;}
.toc-name{font-size:17px!important;}
.toc-desc{font-size:14.5px!important;}
small, .small, .text-small{font-size:15px!important;}
.ch-head{background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;color:#fff!important;text-align:center!important;}
.ch-head *{color:#fff!important;}
.gatha,.verse{font-size:19px!important;line-height:2.2!important;text-align:center!important;}
.text-label{display:block!important;margin-bottom:8px!important;}
/* 壓縮 iframe 底部長空白：最末元素不保留 margin/padding */
body &gt; *:last-child, .ch-body &gt; *:last-child, .ch-body section:last-child,
section:last-child &gt; *:last-child{margin-bottom:0!important;padding-bottom:0!important;}
.ch-body{padding-bottom:0!important;}
section{padding-bottom:0!important;}
/* 手機窄螢幕專用（保持足夠字級，避免疲勞） */
@media (max-width:640px){
  body{padding:0 4px!important;font-size:17.5px!important;}
  .ch-body{padding:18px 10px 6px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17.5px!important;line-height:1.95!important;}
  .ch-body h1{font-size:23px!important;letter-spacing:2px!important;}
  .ch-body h2{font-size:20px!important;letter-spacing:1.5px!important;padding:8px 0 8px 14px!important;line-height:1.6!important;}
  .ch-body h3{font-size:18px!important;letter-spacing:1px!important;}
  .ch-body h4{font-size:16.5px!important;}
  .ch-head{padding:28px 14px!important;}
  .ch-name{font-size:22px!important;letter-spacing:3px!important;}
  .card, .insight, .commentary, .practice, .metaphor, .note, .col{padding:14px 16px!important;margin:12px 0!important;}
  .card-content,.col-content,.section-content,
  .card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
  .classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
    font-size:17.5px!important;line-height:1.95!important;
  }
  .gatha, .verse, blockquote{font-size:18.5px!important;padding:14px 16px!important;line-height:2.1!important;}
  .section-title, .card-title{letter-spacing:1px!important;}
  .inner-toc{padding:14px 14px!important;}
  .inner-toc ol{grid-template-columns:1fr!important;gap:4px 0!important;}
  .inner-toc ol li{font-size:15.5px!important;}
  .four-grid, .two-col, .three-col, .grid-4, .debate, .flow{grid-template-columns:1fr!important;display:block!important;}
  .flow{flex-direction:column!important;}
  /* 英文長詞強制斷行 */
  p, li, div{overflow-wrap:anywhere!important;}
}
@media (max-width:420px){
  body{font-size:17px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17px!important;}
  .ch-body h2{font-size:19px!important;}
  .ch-body{padding:14px 8px 4px!important;}
}

  transform:translateX(-50%);
  width:72px; height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11px; letter-spacing:5px; color:var(--goldL);
  text-transform:uppercase; margin-bottom:10px;}
.ch-name{font-size:28px; font-weight:700; letter-spacing:4px;
  color:#fff; margin-bottom:6px;}
.ch-sub{font-size:13px; color:#c9b88a; letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;}

.ch-body{
  max-width:900px; margin:0 auto; padding:30px 26px 10px;
  background:transparent;
}
.ch-body &gt; section{margin-bottom:12px;}

/* ───── 章內小目次 ───── */
.inner-toc{
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:18px 26px; margin:6px 0 22px;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.inner-toc-title{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  color:var(--gold); font-size:12px; letter-spacing:4px;
  margin-bottom:10px; text-align:center;
}
.inner-toc ol{list-style:none; counter-reset:itc; padding-left:0;
  display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:6px 22px;}
.inner-toc ol li{
  counter-increment:itc; padding:4px 0;
  font-size:14.5px; color:var(--text2);
  border-bottom:1px dashed rgba(184,134,11,.18);
}
.inner-toc ol li::before{
  content:counter(itc) &quot;. &quot;;
  color:var(--gold); font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-weight:700; margin-right:6px;
}
.inner-toc ol li a{color:inherit;text-decoration:none;}
.inner-toc ol li a:hover{color:var(--accent);}

/* ───── 標題層級 ───── */
.ch-body h2{
  font-size:21px; color:var(--accent);
  font-weight:700; letter-spacing:2px;
  border-left:4px solid var(--gold);
  padding:10px 0 10px 20px;
  margin:32px 0 14px;
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);
  scroll-margin-top:20px;
}
.ch-body h3{
  font-size:17px; color:var(--text); font-weight:700;
  margin:24px 0 10px; padding-bottom:5px;
  border-bottom:1px solid var(--border);
  letter-spacing:1.5px;
}
.ch-body h4{font-size:15.5px;color:var(--text2);font-weight:600;
  margin:18px 0 8px;letter-spacing:1px;}
.ch-body h5{font-size:14.5px;color:var(--gold);font-weight:600;margin:12px 0 6px;}
.ch-body p{margin:0 0 12px;color:var(--text);}

.ch-body strong,.ch-body b{color:var(--accent-red);font-weight:700;}

/* ───── 偈頌／引文 ───── */
.verse,.gatha{
  background:var(--verseBg);
  border-left:4px solid var(--verseBd);
  border-radius:0 6px 6px 0;
  padding:16px 24px; margin:16px 0;
  line-height:2; white-space:normal;
  text-align:center; font-size:17px;
  color:var(--text); font-weight:500;
}
.verse-skt{
  background:#fdf8e8; border-left:3px dashed var(--accentL);
  padding:10px 20px; margin:10px 0;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-style:italic; color:var(--text2); font-size:15px;
  text-align:center;
}

/* ───── 經典原文 ───── */
.classical-text{
  background:#FFFDF5;
  border:1px solid #E8E0D0;
  border-radius:10px;
  padding:20px 28px;
  margin:16px 0;
  line-height:1.95;
  position:relative;
}
.text-label{
  display:inline-block;
  background:var(--primary); color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11px; letter-spacing:3px;
  padding:3px 12px; border-radius:4px;
  margin-bottom:10px;
}
.classical-text p{color:var(--text);font-size:16px;line-height:2.1;}

/* ───── 卡片 ───── */
.card,.insight,.commentary,.practice,.metaphor,.note{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px 24px;
  margin:16px 0;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.card-title,.insight-title{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11px; letter-spacing:4px;
  color:#fff; background:var(--gold);
  display:inline-block; padding:3px 14px;
  border-radius:12px; margin-bottom:12px;
}
.commentary .card-title{background:var(--accent);}
.practice .card-title{background:var(--primary-light);}
.metaphor .card-title{background:var(--accentL);}
.note .card-title{background:var(--text-muted);}

/* ───── 橋接 ───── */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:10px;
  padding:18px 26px; margin:10px 0 22px;
  box-shadow:0 2px 8px rgba(91,58,41,.05);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:26px; margin-bottom:12px;
}
.bridge-label{
  display:inline-block;
  font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:11px;
  background:var(--gold); color:#fff;
  padding:3px 12px; border-radius:12px;
  letter-spacing:2px; margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 6px;color:var(--text2);line-height:2;font-size:15.5px;}
.bridge p:last-child{margin:0;}

/* ───── 格線 ───── */
.two-col,.four-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:14px 0;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0;}
.col-card{
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:16px 20px;
}
.col-title{color:var(--accent);font-size:15px;font-weight:700;
  margin-bottom:8px;letter-spacing:1px;}
.col-content{color:var(--text);font-size:15px;line-height:1.85;}

/* ───── 問答 ───── */
.qa{margin:16px 0;border-radius:10px;overflow:hidden;
  border:1px solid var(--border);background:var(--card);}
.qa .q{
  background:linear-gradient(90deg,rgba(30,80,140,.08),rgba(30,80,140,.02));
  border-left:4px solid #2d5b9a;
  padding:12px 20px; color:#1e3a66;
  font-weight:600;
}
.qa .a{
  padding:12px 20px;
  color:var(--text);
  border-left:4px solid var(--accent);
  background:linear-gradient(90deg,rgba(139,94,60,.05),transparent);
}

/* ───── 流程 ───── */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:8px;margin:18px 0;padding:16px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;}
.flow-box,.flow-step{
  background:linear-gradient(135deg,#fffdf5,#f0e8d8);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 18px;
  min-width:100px; text-align:center;
  color:var(--text); font-size:14.5px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.flow-arrow{color:var(--gold);font-size:20px;font-weight:700;}
.flow-v{flex-direction:column;}

/* ───── 對照表 ───── */
.compare-table{
  width:100%; border-collapse:collapse;
  margin:14px 0;
  background:var(--card);
  border-radius:10px; overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.compare-table th,.compare-table td{
  padding:12px 14px; border:1px solid var(--border);
  font-size:14.5px; vertical-align:top; line-height:1.75;
}
.compare-table th{
  background:var(--headGrad); color:#fff;
  font-weight:600; letter-spacing:1px;
  text-align:center;
}
.compare-table tr:nth-child(even) td{background:#faf6ec;}
.compare-table td.hl{color:var(--accent-red);font-weight:600;}

/* ───── 維度條 ───── */
.spectrum{
  display:flex; align-items:center; gap:10px;
  padding:14px 20px; margin:14px 0;
  background:linear-gradient(90deg,rgba(30,30,50,.06),rgba(184,134,11,.06));
  border-radius:8px; border:1px solid var(--border);
}
.spectrum-left,.spectrum-right{
  flex:1; padding:8px 12px; border-radius:6px; font-size:14.5px; text-align:center;
}
.spectrum-left{background:rgba(30,30,50,.1);color:#1b2540;}
.spectrum-right{background:rgba(184,134,11,.15);color:var(--accent-red);}
.spectrum-mid{color:var(--gold);font-size:18px;font-weight:700;}

/* ───── 下一章連結 ───── */
.next-link{
  display:block; text-align:center;
  margin:20px auto 10px;
  padding:12px 28px;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  color:#fff; text-decoration:none;
  border-radius:28px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  letter-spacing:3px; font-size:14px;
  max-width:320px;
  box-shadow:0 3px 12px rgba(184,134,11,.3);
  transition:all .3s;
}
.next-link:hover{transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(184,134,11,.45);}

/* ───── Callout / 法印 ───── */
.seal{
  display:inline-block;
  padding:3px 12px; border-radius:12px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11.5px; letter-spacing:2px;
  background:var(--accent); color:#fff;
  margin-right:6px;
}
.seal.gold{background:var(--gold);}
.seal.red{background:var(--accent-red);}
.seal.navy{background:#1e3a66;}
.seal.dark{background:var(--primary);}

/* ───── 閱讀進度膠囊 ───── */
.read-progress{
  position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
  z-index:120; background:rgba(30,26,20,.92); color:var(--gold);
  padding:8px 22px; border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px; letter-spacing:2px;
  display:flex; align-items:center; gap:12px;
  pointer-events:none; user-select:none;
  backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* ───── 回頂按鈕 ───── */
#backTop{
  position:fixed; right:22px; bottom:22px; z-index:110;
  width:44px; height:44px; border-radius:50%; border:0;
  background:var(--primary); color:var(--gold);
  font-size:18px; cursor:pointer; display:none;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
  transition:transform .3s;
}
#backTop:hover{transform:translateY(-3px);}

/* ───── 頁尾 ───── */
.site-footer{
  padding:40px 24px 34px;
  background:linear-gradient(180deg,#1e1a14,#2a2218);
  color:#a89773; text-align:center;
  margin-top:50px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
}
.site-footer-title{
  color:var(--goldL); font-size:16px; letter-spacing:5px;
  margin-bottom:10px;
}
.site-footer-line{
  width:80px; height:1px; background:rgba(184,134,11,.4);
  margin:12px auto;
}
.site-footer-meta{font-size:12px; color:#8a7759; letter-spacing:2px;}

/* ───── 響應式 ───── */
@media(max-width:900px){
  :root{--sbW:0px;}
  #sb{transform:translateX(-100%);transition:transform .3s;width:220px;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:32px;letter-spacing:3px;}
  .hero-sub{font-size:15px;letter-spacing:2px;}
  .site-hero{padding:60px 16px 44px;}
  .ch-head{padding:28px 16px;}
  .ch-name{font-size:22px;letter-spacing:2px;}
  .ch-body{padding:22px 16px 8px;}
  .two-col,.four-grid,.three-col{grid-template-columns:1fr;}
  .preface{padding:22px 20px;}
  body{font-size:15.5px;}
}

html,body{margin:0;padding:0;background:transparent;
  overflow-x:hidden!important;overflow-y:hidden!important;
  max-width:100vw!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;
  font-style:normal!important;
  box-sizing:border-box!important;}
body{padding:0 6px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img,video,iframe,table{max-width:100%!important;height:auto;}
img{-webkit-user-drag:none!important;pointer-events:none;}
.ch-body{background:var(--bg,#f7f3ec)!important;max-width:100%!important;margin:0 auto!important;}
/* 防止橫向溢位：所有區塊以中文逐字斷行為原則 */
.ch-body, .ch-body *{max-width:100%!important;}
p, li, div, span, td, th, h1, h2, h3, h4, h5, h6, a,
.card, .col, .flow, .note, .gatha, .verse, .inner-toc,
.insight, .commentary, .practice, .metaphor, .quote,
.classical-text, .section-content, .bridge, .callout, .highlight{
  overflow-wrap:break-word!important;
  word-break:break-word!important;
}
pre, code{white-space:pre-wrap!important;word-break:break-all!important;}
table{table-layout:fixed!important;width:100%!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}
.toc-section, .toc{background:transparent!important;}
.card,.col,.flow,.compare-table,.insight,.commentary,.practice,.metaphor,.note{background:var(--card,#fffdf7)!important;}
/* 注意：不要覆寫 .card-title / .col-title / .text-label 顏色。
   這類元素在多數來源檔中是有色底 + 白字膠囊，任意改字色會造成底字同色看不清。 */
/* 加大正文字級，降低長時間閱讀疲勞 */
html,body{font-size:19px!important;line-height:1.95!important;}
.ch-body, .ch-body p, .ch-body li{font-size:19px!important;line-height:2!important;}
.ch-body h2{font-size:23px!important;line-height:1.7!important;}
.ch-body h3{font-size:19.5px!important;line-height:1.7!important;}
.ch-body h4{font-size:18px!important;}
.card-content,.col-content,.section-content,
.card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
.classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
  font-size:19px!important;line-height:2!important;
}
.gatha,.verse,.verse p{font-size:20.5px!important;line-height:2.2!important;}
.qa .q, .qa .a, .qa-2, .qa-3{font-size:19px!important;line-height:2!important;}
.inner-toc ol li{font-size:16px!important;}
.toc-name{font-size:17px!important;}
.toc-desc{font-size:14.5px!important;}
small, .small, .text-small{font-size:15px!important;}
.ch-head{background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;color:#fff!important;text-align:center!important;}
.ch-head *{color:#fff!important;}
.gatha,.verse{font-size:19px!important;line-height:2.2!important;text-align:center!important;}
.text-label{display:block!important;margin-bottom:8px!important;}
/* 壓縮 iframe 底部長空白：最末元素不保留 margin/padding */
body &gt; *:last-child, .ch-body &gt; *:last-child, .ch-body section:last-child,
section:last-child &gt; *:last-child{margin-bottom:0!important;padding-bottom:0!important;}
.ch-body{padding-bottom:0!important;}
section{padding-bottom:0!important;}
/* 手機窄螢幕專用（保持足夠字級，避免疲勞） */
@media (max-width:640px){
  body{padding:0 4px!important;font-size:17.5px!important;}
  .ch-body{padding:18px 10px 6px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17.5px!important;line-height:1.95!important;}
  .ch-body h1{font-size:23px!important;letter-spacing:2px!important;}
  .ch-body h2{font-size:20px!important;letter-spacing:1.5px!important;padding:8px 0 8px 14px!important;line-height:1.6!important;}
  .ch-body h3{font-size:18px!important;letter-spacing:1px!important;}
  .ch-body h4{font-size:16.5px!important;}
  .ch-head{padding:28px 14px!important;}
  .ch-name{font-size:22px!important;letter-spacing:3px!important;}
  .card, .insight, .commentary, .practice, .metaphor, .note, .col{padding:14px 16px!important;margin:12px 0!important;}
  .card-content,.col-content,.section-content,
  .card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
  .classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
    font-size:17.5px!important;line-height:1.95!important;
  }
  .gatha, .verse, blockquote{font-size:18.5px!important;padding:14px 16px!important;line-height:2.1!important;}
  .section-title, .card-title{letter-spacing:1px!important;}
  .inner-toc{padding:14px 14px!important;}
  .inner-toc ol{grid-template-columns:1fr!important;gap:4px 0!important;}
  .inner-toc ol li{font-size:15.5px!important;}
  .four-grid, .two-col, .three-col, .grid-4, .debate, .flow{grid-template-columns:1fr!important;display:block!important;}
  .flow{flex-direction:column!important;}
  /* 英文長詞強制斷行 */
  p, li, div{overflow-wrap:anywhere!important;}
}
@media (max-width:420px){
  body{font-size:17px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17px!important;}
  .ch-body h2{font-size:19px!important;}
  .ch-body{padding:14px 8px 4px!important;}
}

<span class="rp-label"><span class="wy-t" data-wy-t="UFJPR1JFU1M="></span></span>
<div class="rp-bar"><div class="rp-fill" id="rpFill"></div></div>
<span class="rp-pct" id="rpPct"><span class="wy-t" data-wy-t="MCU="></span></span>
</div>
<button aria-label="Back to top" id="backTop">↑</button>
<script>
/* ===== Hamburger ===== */
var sb = document.getElementById('sb');
var sbToggle = document.getElementById('sbToggle');
if(sbToggle){sbToggle.addEventListener('click', function(){sb.classList.toggle('open');});}

/* ===== Back to top ===== */
var backTop = document.getElementById('backTop');
backTop.addEventListener('click', function(){window.scrollTo({top:0, behavior:'smooth'});});

/* ===== Active sidebar + progress ===== */
var rpFill = document.getElementById('rpFill');
var rpPct  = document.getElementById('rpPct');
function updateProgress(){
  var sh = document.documentElement.scrollHeight - window.innerHeight;
  var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
  if(rpFill) rpFill.style.width = pct + '%';
  if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';

  /* sidebar highlight */
  var chapters = document.querySelectorAll('.chapter');
  var active = null;
  var trigger = window.innerHeight * 0.35;
  chapters.forEach(function(ch){
    var r = ch.getBoundingClientRect();
    if(r.top < trigger) active = ch;
  });
  document.querySelectorAll('.sb-item').forEach(function(a){a.classList.remove('active');});
  if(active){
    var id = active.id;
    var link = document.querySelector('.sb-item[href="#'+id+'"]');
    if(link) link.classList.add('active');
  }

  /* back-to-top visibility */
  if(window.scrollY > 600) backTop.classList.add('visible');
  else backTop.classList.remove('visible');
}
window.addEventListener('scroll', updateProgress, {passive:true});
updateProgress();

/* ===== iframe auto-height ===== */
function resizeFrame(f){
  try{
    var d = f.contentDocument || f.contentWindow.document;
    if(!d || !d.body) return;
    var h = Math.max(d.documentElement.scrollHeight, d.body.scrollHeight);
    if(h > 100){f.style.height = (h + 4) + 'px'; f.style.minHeight = '0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries = 0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries < 30) setTimeout(tick, 200);
  }
  if(f.contentDocument && f.contentDocument.readyState === 'complete'){tick();}
  else {f.addEventListener('load', tick);}
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);

var rzT;
window.addEventListener('resize', function(){
  clearTimeout(rzT);
  rzT = setTimeout(resizeAllFrames, 200);
});

/* ===== Anchor click correction ===== */
document.addEventListener('click', function(e){
  var a = e.target;
  while(a && a.tagName !== 'A') a = a.parentElement;
  if(!a) return;
  var h = a.getAttribute('href');
  if(!h || h.charAt(0) !== '#' || h.length < 2) return;
  var id = h.substring(1);
  var el = document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect = el.getBoundingClientRect();
    var y = window.scrollY + rect.top - 20;
    window.scrollTo({top:y, behavior:'smooth'});
  }, 60);
}, true);

/* Periodic recalc */
var _rt=0, _riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt > 50) clearInterval(_riv);
}, 300);

/* ===== Anti-copy ===== */
(function(){
  var blk = function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev, blk, true);
  });
  document.addEventListener('keydown', function(e){
    var k = e.key;
    if(e.ctrlKey && (k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12') blk(e);
    if(e.ctrlKey && e.shiftKey && (k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  }, true);
  setInterval(function(){
    if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
  }, 400);
})();
</script>
<script>(function(){
  function dec(s){
    try{
      return decodeURIComponent(Array.prototype.map.call(atob(s),function(c){
        return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
    }catch(e){return '';}
  }
  var ns=document.querySelectorAll('[data-wy-t]');
  for(var i=0;i<ns.length;i++){
    ns[i].textContent=dec(ns[i].getAttribute('data-wy-t'));
    ns[i].removeAttribute('data-wy-t');
  }
})();</script></body>
</html>
