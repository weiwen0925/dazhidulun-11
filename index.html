<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:88px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{font-size:20px;line-height:1.8;}

/* 隱形錨點，配合 sb-brand 回頂 */
#top{position:absolute;top:0;left:0;width:1px;height:1px;overflow:hidden;}

/* ── 側欄 ── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}

.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}

.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;padding-top:6px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:var(--sbText);padding:3px 4px;width:100%;
  transition:all .25s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.12);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--sbText);font-family:"Noto Sans TC",sans-serif;
  font-size:15px;font-weight:600;transition:all .25s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;letter-spacing:.5px;
  opacity:.85;text-align:center;line-height:1.2;}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;border-color:var(--gold);
  box-shadow:0 0 10px rgba(184,134,11,.6);}
.sb-item.active .sb-label{color:var(--goldL);font-weight:600;opacity:1;}

/* 漢堡 */
#sbToggle{display:none;position:fixed;top:14px;left:14px;width:42px;height:42px;
  z-index:110;background:var(--sbBg);color:var(--gold);
  border:1px solid var(--gold);border-radius:8px;font-size:20px;cursor:pointer;}

/* ── 底部進度膠囊（中文 + 接近頁尾淡出） ── */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;
}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* ── 主內容 ── */
.main{margin-left:var(--sbW);padding:0;}

.site-hero{
  position:relative;background:var(--headGrad);color:#fff;
  padding:74px 24px 64px;text-align:center;overflow:hidden;
}
.site-hero::before{
  content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:340px;color:#fff;opacity:.03;
  letter-spacing:30px;font-weight:900;pointer-events:none;
}
.site-hero h1.hero-title{margin:0 0 18px;font-size:56px;letter-spacing:18px;
  font-weight:900;color:var(--goldL);text-shadow:0 2px 12px rgba(0,0,0,.4);position:relative;}
.hero-subtitle{font-size:20px;letter-spacing:5px;color:#e8d8b8;margin:0 0 14px;position:relative;}
.hero-range{font-size:17px;letter-spacing:3px;color:#c4a87a;opacity:.85;margin:0 0 8px;position:relative;}
.hero-tag{font-size:13px;letter-spacing:5px;color:#b08d5a;opacity:.7;
  font-family:"Noto Sans TC",sans-serif;margin-top:14px;position:relative;}

/* preface */
.preface{max-width:860px;margin:48px auto 0;padding:0 28px;}
.preface-title{font-size:30px;letter-spacing:8px;color:var(--accent);
  text-align:center;margin:0 0 22px;font-weight:700;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 18px;text-align:justify;text-indent:2em;}

/* toc */
.toc-section{max-width:1100px;margin:50px auto 24px;padding:0 28px;}
.toc-title{font-size:34px;letter-spacing:10px;color:var(--accent);
  text-align:center;margin:0 0 8px;font-weight:700;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);
  font-family:"Noto Sans TC",sans-serif;letter-spacing:3px;margin:0 0 28px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
.toc-card{display:block;text-decoration:none;color:var(--text);
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:18px 22px;transition:all .25s;
  box-shadow:0 1px 4px rgba(91,58,41,.06);position:relative;}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.15);
  border-color:var(--gold);}
.toc-num{display:inline-flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;background:var(--gold);color:#fff;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:600;
  margin-right:12px;vertical-align:middle;}
.toc-name{display:inline;font-size:19.5px;line-height:1.7;color:var(--text);}
.toc-sub{display:block;margin-top:8px;font-size:14.5px;color:var(--text-muted);
  font-family:"Noto Sans TC",sans-serif;letter-spacing:.5px;line-height:1.55;}

/* chapter */
.chapter{margin:36px 0;padding:0;}
.ch-head{background:var(--headGrad);color:#fff;padding:42px 24px 36px;text-align:center;
  position:relative;overflow:hidden;}
.ch-head::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:90px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:5px;
  color:var(--goldL);opacity:.85;margin:0 0 12px;}
.ch-name{font-size:34px;letter-spacing:6px;font-weight:700;color:#fff;margin:0 0 10px;}
.ch-sub{font-size:17px;letter-spacing:2.5px;color:#c4a87a;opacity:.85;
  font-family:"Noto Sans TC",sans-serif;}

.ch-body{max-width:980px;margin:24px auto 0;padding:0 22px;background:transparent;}

/* bridge */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;min-height:180px;}

.next-link{display:inline-block;margin:14px 0 0;padding:9px 22px;
  background:var(--accent);color:#fff;text-decoration:none;border-radius:22px;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:2.5px;
  transition:background .25s;}
.next-link:hover{background:var(--gold);}

/* footer */
.site-footer{margin-top:60px;padding:34px 24px 110px;text-align:center;
  background:linear-gradient(180deg,transparent,rgba(184,134,11,.06));border-top:1px solid var(--border);}
.site-footer p{margin:0 0 6px;color:var(--text-muted);font-size:15px;letter-spacing:2px;
  font-family:"Noto Sans TC",sans-serif;}

#backTop{display:none;position:fixed;right:24px;bottom:80px;width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:0;font-size:20px;cursor:pointer;z-index:110;
  box-shadow:0 4px 12px rgba(0,0,0,.25);}
#backTop:hover{background:var(--gold);}

@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;padding-top:60px;}
  .site-hero h1.hero-title{font-size:38px;letter-spacing:10px;}
  .ch-name{font-size:26px;letter-spacing:3px;}
  .ch-head{padding:30px 18px 24px;}
  .toc-grid{grid-template-columns:1fr;}
  .read-progress{padding:7px 16px;letter-spacing:1px;}
  .read-progress .rp-bar{width:100px;}
}
</style>

<script>
var rpFill=document.getElementById('rpFill');
var rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();

(function(){
  var cap=document.getElementById('readProgress');
  if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var targets=[];
  var f1=document.querySelector('[data-wy-notice="v2"]');
  if(f1)targets.push(f1);
  var f2=document.querySelector('.site-footer');
  if(f2)targets.push(f2);
  if(!targets.length)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(entries){
      var any=entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    targets.forEach(function(t){io.observe(t);});
  }else{
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sb=window.scrollY+window.innerHeight;
      setHide(dh-sb<240);
    };
    window.addEventListener('scroll',check,{passive:true});
    check();
  }
})();

/* sticky brand 回頂 */
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){
  sbBrand.addEventListener('click',function(e){
    e.preventDefault();
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

/* highlight sidebar based on scroll */
function highlight(){
  var chapters=document.querySelectorAll('.chapter');
  var vh=window.innerHeight;
  var active=null;
  chapters.forEach(function(ch){
    var rc=ch.getBoundingClientRect();
    if(rc.top<vh*0.35) active=ch;
  });
  document.querySelectorAll('.sb-item').forEach(function(it){it.classList.remove('active');});
  if(active){
    var id=active.getAttribute('id').replace('chapter-','');
    var it=document.querySelector('.sb-item[data-ch="'+id+'"]');
    if(it){
      it.classList.add('active');
      var sb=document.getElementById('sb');
      var ir=it.getBoundingClientRect();
      var sr=sb.getBoundingClientRect();
      if(ir.top<sr.top+60||ir.bottom>sr.bottom-30){
        sb.scrollTo({top:sb.scrollTop+(ir.top-sr.top)-120,behavior:'smooth'});
      }
    }
  }
}
window.addEventListener('scroll',highlight,{passive:true});
highlight();

/* iframe 自動高度（只讀 body.scrollHeight） */
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){
    tries++;resizeFrame(f);
    if(tries<30) setTimeout(tick,200);
  }
  if(f.contentDocument && f.contentDocument.readyState==='complete') tick();
  else f.addEventListener('load',tick);
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

document.addEventListener('click',function(e){
  var a=e.target;
  while(a&&a.tagName!=='A') a=a.parentElement;
  if(!a)return;
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var id=h.substring(1);
  var el=document.getElementById(id);
  if(!el)return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    var y=window.scrollY+rect.top-20;
    window.scrollTo({top:y,behavior:'smooth'});
  },60);
},true);

var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

/* 漢堡選單 */
var ham=document.getElementById('sbToggle');
if(ham){
  ham.addEventListener('click',function(){
    document.getElementById('sb').classList.toggle('open');
  });
}

/* backTop */
var bt=document.getElementById('backTop');
window.addEventListener('scroll',function(){
  if(bt) bt.style.display = window.scrollY>600 ? 'block' : 'none';
},{passive:true});
if(bt) bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

/* 防複製 */
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
  document.addEventListener(ev,function(e){e.preventDefault();return false;},true);
});
document.addEventListener('keydown',function(e){
  var k=e.key;
  if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U')){e.preventDefault();}
  if(k==='F12')e.preventDefault();
  if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K'))e.preventDefault();
},true);
setInterval(function(){if(window.getSelection)try{window.getSelection().removeAllRanges();}catch(e){}},400);

      e.preventDefault(); e.stopPropagation();
      return false;

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-11-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
