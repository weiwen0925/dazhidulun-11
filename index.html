<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><meta content="noindex,nofollow,noarchive" name="robots"/><title>大智度論 · 卷十一 · 第十一卷全七品彙整</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/><style>
:root{
 --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
 --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
 --gold:#b8860b;--goldL:#d4a84b;--border:#d4c4a8;--border-light:#EDE8E0;
 --card:#fffdf7;--verseBg:#f0e8d8;--verseBd:#c4956a;
 --sbW:84px;--sbBg:#1e1a14;--sbText:#d4c4a8;
 --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);--r:8px;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{background:var(--bg);color:var(--text);font-size:20px;line-height:1.85;
 font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
 -webkit-text-size-adjust:100%;
 -webkit-user-select:none;-moz-user-select:none;user-select:none;
 -webkit-touch-callout:none;}
img{-webkit-user-drag:none;}
a{color:inherit;text-decoration:none;}

/* 側欄 */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
 color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
 padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
 text-align:center;line-height:1.5;z-index:5;cursor:pointer;display:block;
 background:linear-gradient(to bottom,var(--sbBg) 80%,rgba(30,26,20,0));
 padding:14px 4px 12px;margin-bottom:6px;
 border-bottom:1px solid rgba(184,134,11,.25);transition:color .25s;}
.sb-brand:hover{color:var(--goldL);}
.sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;color:var(--gold);}
.sb-brand-line2{display:block;font-size:14px;font-weight:700;letter-spacing:2.5px;
 color:var(--goldL);margin-top:3px;}
.sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:3px;color:var(--gold);}
.sb-nav{display:flex;flex-direction:column;gap:5px;width:100%;align-items:center;padding-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
 padding:5px 4px;width:92%;border-radius:8px;cursor:pointer;transition:background .2s;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-item.active{background:rgba(184,134,11,.92);box-shadow:0 0 14px rgba(184,134,11,.55);}
.sb-item.active .sb-circle{border-color:#fff;color:#fff;background:rgba(0,0,0,.18);}
.sb-item.active .sb-label{color:#2a2218;font-weight:700;}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);
 display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;
 font-family:"Noto Sans TC",sans-serif;color:var(--goldL);}
.sb-label{font-size:12px;letter-spacing:.5px;color:var(--sbText);
 font-family:"Noto Sans TC",sans-serif;text-align:center;line-height:1.3;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:130;width:44px;height:44px;
 border:0;border-radius:10px;background:var(--sbBg);color:var(--gold);font-size:20px;cursor:pointer;}

/* 閱讀進度 */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
 background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
 border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
 font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
 display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;
 backdrop-filter:blur(6px);transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
.rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;
 overflow:hidden;position:relative;}
.rp-fill{position:absolute;top:0;left:0;bottom:0;width:0%;
 background:linear-gradient(90deg,var(--gold),var(--goldL));transition:width .3s;}
.rp-pct{font-weight:600;min-width:40px;text-align:right;font-size:13px;}

/* 主區 */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;overflow:hidden;background:var(--headGrad);
 color:#f3e9d2;text-align:center;padding:96px 28px 86px;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);font-size:340px;font-weight:900;
 color:rgba(212,168,75,.04);white-space:nowrap;pointer-events:none;}
.hero-inner{position:relative;z-index:2;}
.hero-byline{font-family:"Noto Sans TC",sans-serif;font-size:16px;letter-spacing:3px;
 color:var(--goldL);opacity:.9;margin-bottom:20px;}
.hero-title{font-size:60px;font-weight:900;letter-spacing:10px;color:var(--goldL);
 margin-bottom:18px;text-shadow:0 2px 18px rgba(0,0,0,.4);}
.hero-subtitle{font-size:21px;letter-spacing:3px;color:#e8dcc0;margin-bottom:26px;}
.hero-range{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:15px;
 letter-spacing:1.5px;color:var(--goldL);border:1px solid rgba(184,134,11,.5);
 border-radius:24px;padding:8px 22px;line-height:1.7;}

/* 前言 */
.preface{max-width:880px;margin:54px auto 10px;padding:0 32px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);font-weight:700;
 letter-spacing:4px;margin-bottom:26px;}
.preface-title::after{content:"";display:block;width:64px;height:3px;
 background:var(--gold);margin:14px auto 0;border-radius:2px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin-bottom:16px;text-align:justify;}
.preface p.lead::first-letter{font-size:30px;color:var(--accent);font-weight:700;}

/* 總目錄 */
.toc-section{max-width:1120px;margin:48px auto 20px;padding:0 32px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);font-weight:700;letter-spacing:8px;}
.toc-title::after{content:"";display:block;width:80px;height:3px;background:var(--gold);
 margin:16px auto 0;border-radius:2px;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;
 color:var(--text-muted);letter-spacing:2px;margin:14px 0 30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.toc-card{display:flex;gap:16px;align-items:flex-start;background:var(--card);
 border:1px solid var(--border);border-radius:12px;padding:20px 22px;cursor:pointer;
 box-shadow:0 1px 4px rgba(91,58,41,.07);transition:transform .18s,box-shadow .18s,border-color .18s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.16);
 border-color:var(--gold);}
.toc-num{flex:none;width:42px;height:42px;border-radius:50%;
 background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
 display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;
 font-family:"Noto Sans TC",sans-serif;}
.toc-name{font-size:19.5px;font-weight:700;color:var(--accent);line-height:1.6;margin-bottom:6px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:14px;color:var(--text-muted);
 letter-spacing:1px;line-height:1.6;}

/* 章節 */
.chapter{margin:30px 0;scroll-margin-top:24px;}
.ch-head{background:var(--headGrad);color:#f3e9d2;text-align:center;padding:54px 28px;
 position:relative;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:3px;
 color:var(--goldL);opacity:.92;margin-bottom:14px;}
.ch-name{font-size:36px;font-weight:900;letter-spacing:3px;color:#f0e2bf;
 line-height:1.4;margin-bottom:14px;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:1.5px;
 color:#d8c79c;line-height:1.7;}
.ch-head::after{content:"";display:block;width:70px;height:3px;background:var(--gold);
 margin:20px auto 0;border-radius:2px;}
.ch-body{max-width:1000px;margin:0 auto;padding:34px 30px 8px;}

/* 橋接 */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
 border-left:5px solid var(--gold);border-radius:10px;padding:20px 26px;margin:0 0 28px;
 box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
 background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:32px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
 background:var(--gold);color:#fff;padding:4px 14px;border-radius:12px;
 letter-spacing:2.2px;margin-bottom:12px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.05;font-size:18.5px;text-align:justify;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
 border:1px solid var(--border);border-radius:12px;
 box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:200px;}

.next-link{display:inline-flex;align-items:center;gap:8px;margin:8px 0 4px;
 font-family:"Noto Sans TC",sans-serif;font-size:16px;color:var(--accent);
 border:1px solid var(--border);border-radius:24px;padding:9px 22px;cursor:pointer;
 transition:background .2s,color .2s,border-color .2s;}
.next-link:hover{background:var(--gold);color:#fff;border-color:var(--gold);}

#backTop{position:fixed;right:24px;bottom:24px;width:46px;height:46px;border-radius:50%;
 border:0;background:var(--sbBg);color:var(--gold);font-size:20px;cursor:pointer;
 z-index:120;display:none;box-shadow:0 4px 14px rgba(0,0,0,.3);}

@media(max-width:900px){
 #sb{transform:translateX(-100%);transition:transform .3s;}
 #sb.open{transform:translateX(0);}
 #sbToggle{display:block;}
 .main{margin-left:0;}
 .site-hero{padding:78px 20px 60px;}
 .hero-title{font-size:42px;letter-spacing:6px;}
 .site-hero::before{font-size:200px;}
 .ch-head{padding:42px 18px;}
 .ch-name{font-size:28px;}
 .ch-body{padding:26px 18px 8px;}
 .toc-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
 body{font-size:18px;}
 .hero-title{font-size:34px;letter-spacing:3px;}
 .preface,.toc-section{padding:0 18px;}
}

(function(){
 var blk=function(e){e.preventDefault();return false;};
 ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
  document.addEventListener(ev,blk,true);});
 document.addEventListener('keydown',function(e){var k=e.key;
  if(e.ctrlKey&&'cCaAsSpPuUxX'.indexOf(k)>-1)blk(e);
  if(k==='F12')blk(e);
  if(e.ctrlKey&&e.shiftKey&&'IJCK'.indexOf(k)>-1)blk(e);},true);
})();

var sb=document.getElementById('sb');
var sbToggle=document.getElementById('sbToggle');
if(sbToggle)sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});
var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){
 e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});

document.querySelectorAll('a[data-ch],a.toc-card,a.next-link').forEach(function(a){
 a.addEventListener('click',function(e){
  var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#')return;
  e.preventDefault();
  var el=document.getElementById(h.substring(1));
  if(!el)return;
  resizeAllFrames();
  setTimeout(function(){
   resizeAllFrames();
   var y=window.scrollY+el.getBoundingClientRect().top-14;
   window.scrollTo({top:y,behavior:'smooth'});
   if(sb)sb.classList.remove('open');
  },60);
 });
});

var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){
 var sh=document.documentElement.scrollHeight-window.innerHeight;
 var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
 if(rpFill)rpFill.style.width=pct+'%';
 if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});

var items=document.querySelectorAll('.sb-item');
var chaps=document.querySelectorAll('.chapter');
function highlight(){
 var idx=0;
 for(var i=0;i<chaps.length;i++){
  if(chaps[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;
 }
 items.forEach(function(it,i){it.classList.toggle('active',i===idx);});
 var act=items[idx];
 if(act&&sb){var r=act.getBoundingClientRect();
  if(r.top<70||r.bottom>window.innerHeight-40)
   act.scrollIntoView({block:'center',behavior:'smooth'});}
}
window.addEventListener('scroll',highlight,{passive:true});

function resizeFrame(f){
 try{var d=f.contentDocument||f.contentWindow.document;
  if(!d||!d.body)return;
  d.body.style.minHeight='0';d.body.style.height='auto';
  if(d.documentElement){d.documentElement.style.minHeight='0';
   d.documentElement.style.height='auto';}
  var h=d.body.scrollHeight;
  if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
 }catch(e){}
}
function resizeAllFrames(){
 document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
 updateProgress();
}
function setupFrame(f){
 var tries=0;
 function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
 if(f.contentDocument&&f.contentDocument.readyState==='complete')tick();
 else f.addEventListener('load',tick);
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){
 clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();
 if(_rt>50)clearInterval(_riv);},300);

var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){
 if(backTop)backTop.style.display=window.scrollY>600?'block':'none';
},{passive:true});
if(backTop)backTop.addEventListener('click',function(){
 window.scrollTo({top:0,behavior:'smooth'});});

(function(){
 var cap=document.getElementById('readProgress');
 if(!cap)return;
 var targets=[];
 var f1=document.querySelector('[data-wy-notice="v2"]');if(f1)targets.push(f1);
 var f2=document.querySelector('.site-footer');if(f2)targets.push(f2);
 if(!targets.length)return;
 if('IntersectionObserver' in window){
  var io=new IntersectionObserver(function(es){
   cap.classList.toggle('hide-near-end',es.some(function(e){return e.isIntersecting;}));
  },{rootMargin:'0px 0px -20px 0px',threshold:0.01});
  targets.forEach(function(t){io.observe(t);});
 }
})();

updateProgress();highlight();

      e.preventDefault(); e.stopPropagation();

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-11-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
