<title>大智度論 · 卷十一 · 釋初品第一至七品 彙整閱讀本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--primary:#2C1810;--primary-light:#5B3A29;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  overflow-x:hidden;max-width:100vw;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);line-height:1.95;font-size:19px;
  -webkit-user-drag:none;
}
img{-webkit-user-drag:none;pointer-events:none;}

/* ===== Sidebar ===== */
#sb{
  position:fixed;left:0;top:0;bottom:0;width:var(--sbW);
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:22px 0 28px;overflow-y:auto;
  border-right:1px solid rgba(212,196,168,.1);
}
#sb::-webkit-scrollbar{display:none;}
.sb-logo{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#1e1a14;font-weight:900;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;line-height:1.15;
  font-family:"Noto Sans TC",sans-serif;margin-bottom:18px;
  letter-spacing:0;text-align:center;
}
.sb-logo span{display:block;}
.sb-nav{display:flex;flex-direction:column;gap:14px;width:100%;align-items:center;}
.sb-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--sbText);text-decoration:none;
  padding:4px 2px;width:100%;transition:all .3s;
  font-family:"Noto Sans TC",sans-serif;
}
.sb-circle{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid rgba(212,196,168,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;
  transition:all .3s;
}
.sb-label{font-size:10.5px;opacity:.75;letter-spacing:1px;text-align:center;line-height:1.2;}
.sb-item:hover .sb-circle{border-color:var(--gold);color:var(--gold);}
.sb-item:hover .sb-label{opacity:1;color:var(--gold);}
.sb-item.active .sb-circle{
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#1e1a14;border-color:var(--gold);
  box-shadow:0 0 18px rgba(184,134,11,.45);
}
.sb-item.active .sb-label{opacity:1;color:var(--gold);}

#sbToggle{
  display:none;position:fixed;top:14px;left:14px;z-index:150;
  width:42px;height:42px;border:0;border-radius:8px;
  background:var(--sbBg);color:var(--gold);font-size:22px;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}

/* ===== Main ===== */
.main{
  margin-left:var(--sbW);padding:0 0 80px;
  min-height:100vh;
}

/* ===== Hero ===== */
.site-hero{
  position:relative;
  background:linear-gradient(135deg,#1a1510 0%,#2a1f15 50%,#1a1510 100%);
  color:#f5e6c8;
  padding:70px 40px 60px;
  text-align:center;
  overflow:hidden;
  border-bottom:2px solid var(--gold);
}
.site-hero::before{
  content:"般 若";
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:280px;color:rgba(212,168,75,.04);font-weight:900;
  letter-spacing:60px;pointer-events:none;
}
.hero-content{position:relative;z-index:2;max-width:920px;margin:0 auto;}
.hero-eyebrow{
  font-family:"Noto Sans TC",sans-serif;
  font-size:13px;letter-spacing:8px;color:var(--gold);
  margin-bottom:18px;opacity:.95;
}
.hero-title{
  font-size:58px;font-weight:900;color:var(--goldL);
  letter-spacing:10px;margin-bottom:8px;
  text-shadow:0 2px 20px rgba(184,134,11,.3);
}
.hero-volume{
  font-size:30px;color:#d4a84b;letter-spacing:18px;
  margin-bottom:20px;font-weight:700;
}
.hero-sub-cn{
  font-size:19px;color:#e8d5a8;letter-spacing:3px;
  margin-bottom:8px;
}
.hero-sub-en{
  font-family:"Georgia",serif;font-style:italic;
  font-size:14px;color:#b89968;letter-spacing:2px;
  margin-bottom:18px;opacity:.85;
}
.hero-note{
  font-size:14px;color:#9e8858;letter-spacing:4px;
  font-family:"Noto Sans TC",sans-serif;
}

/* ===== Preface ===== */
.preface{
  max-width:920px;margin:50px auto 20px;padding:0 30px;
}
.preface-title{
  text-align:center;font-family:"Noto Sans TC",sans-serif;
  font-size:14px;color:var(--gold);letter-spacing:6px;
  margin-bottom:20px;
}
.preface p{
  font-size:18px;color:var(--text2);line-height:2;
  margin-bottom:14px;text-align:justify;text-indent:2em;
}

/* ===== TOC ===== */
.toc-section{
  max-width:1100px;margin:50px auto 60px;padding:0 30px;
}
.toc-header{text-align:center;margin-bottom:30px;}
.toc-title{
  font-size:28px;color:var(--accent);letter-spacing:18px;
  font-weight:700;margin-bottom:10px;
}
.toc-desc{
  font-size:13px;color:var(--text-muted);letter-spacing:4px;
  font-family:"Noto Sans TC",sans-serif;
}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;margin-top:26px;
}
.toc-card{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:18px 20px;
  text-decoration:none;color:inherit;
  transition:all .25s;
  box-shadow:0 2px 8px rgba(91,58,41,.06);
}
.toc-card:hover{
  border-color:var(--gold);transform:translateY(-3px);
  box-shadow:0 6px 20px rgba(184,134,11,.2);
}
.toc-num{
  flex:0 0 38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#1e1a14;font-weight:700;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;
}
.toc-body{flex:1;min-width:0;}
.toc-name{
  font-size:17.5px;font-weight:700;color:var(--text);
  margin-bottom:4px;line-height:1.5;
}
.toc-desc{
  font-size:14.5px;color:var(--text-muted);letter-spacing:0;
  line-height:1.6;font-family:"Noto Serif TC",serif;
}

/* ===== Chapter ===== */
.chapter{margin:50px 0;scroll-margin-top:30px;}
.ch-head{
  background:var(--headGrad);color:#fff;
  text-align:center;padding:46px 30px;
  border-top:1px solid var(--gold);border-bottom:3px solid var(--gold);
  position:relative;
}
.ch-head::after{
  content:"";position:absolute;left:50%;bottom:-3px;transform:translateX(-50%);
  width:80px;height:3px;background:var(--goldL);box-shadow:0 0 15px var(--goldL);
}
.ch-num{
  font-family:"Noto Sans TC",sans-serif;
  font-size:13px;letter-spacing:6px;color:var(--gold);
  margin-bottom:14px;
}
.ch-name{
  font-size:34px;font-weight:900;color:var(--goldL);
  letter-spacing:6px;margin-bottom:10px;
}
.ch-sub{
  font-size:15px;color:#d4c4a8;letter-spacing:3px;
  font-family:"Noto Sans TC",sans-serif;
}
.ch-body{
  max-width:1100px;margin:30px auto 0;padding:0 24px;
}

/* ===== Bridge ===== */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:10px;
  padding:20px 26px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;
}
.bridge-label{
  display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;
  background:var(--gold);color:#fff;
  padding:4px 14px;border-radius:12px;
  letter-spacing:3px;margin-bottom:12px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:17px;}

.next-link{
  display:block;text-align:center;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#1e1a14;text-decoration:none;font-weight:700;
  padding:14px 26px;border-radius:30px;
  margin:20px auto 0;max-width:420px;
  font-family:"Noto Sans TC",sans-serif;
  letter-spacing:2px;font-size:14.5px;
  box-shadow:0 4px 14px rgba(184,134,11,.3);
  transition:all .25s;
}
.next-link:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(184,134,11,.45);}

/* ===== iframe ===== */
.ch-frame{
  display:block;width:100%;border:0;
  background:#fffdf7;
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;
  min-height:180px;
}

/* ===== Read Progress ===== */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
}
.read-progress .rp-bar{
  width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;
}
.read-progress .rp-fill{
  position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;
}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* ===== Back to top ===== */
#backTop{
  position:fixed;right:24px;bottom:70px;
  width:44px;height:44px;border-radius:50%;border:0;
  background:var(--accent);color:#fff;
  font-size:20px;cursor:pointer;opacity:0;
  transition:all .3s;box-shadow:0 4px 14px rgba(91,58,41,.3);
  z-index:110;
}
#backTop.visible{opacity:.9;}
#backTop:hover{background:var(--gold);opacity:1;}

/* ===== Footer ===== */
.site-footer{
  margin-top:60px;background:var(--sbBg);color:#d4c4a8;
  padding:40px 30px;text-align:center;
  border-top:2px solid var(--gold);
}
.footer-inner{max-width:720px;margin:0 auto;}
.footer-title{
  font-size:22px;font-weight:900;color:var(--goldL);
  letter-spacing:10px;margin-bottom:6px;
}
.footer-sub{font-size:14px;color:#d4a84b;letter-spacing:4px;margin-bottom:14px;}
.footer-note{font-size:13px;color:#9e8858;letter-spacing:3px;margin-bottom:10px;font-family:"Noto Sans TC",sans-serif;}
.footer-disclaimer{font-size:12px;color:#7a6a48;letter-spacing:1.5px;opacity:.75;}

/* ===== Responsive ===== */
@media (max-width:900px){
  :root{--sbW:0px;}
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);width:200px;}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .site-hero{padding:90px 20px 40px;}
  .hero-title{font-size:38px;letter-spacing:6px;}
  .hero-volume{font-size:22px;letter-spacing:10px;}
  .toc-grid{grid-template-columns:1fr;}
  .ch-head{padding:34px 20px;}
  .ch-name{font-size:24px;letter-spacing:3px;}
  .ch-body{padding:0 8px;}
  .read-progress{padding:6px 14px;font-size:11px;}
  .read-progress .rp-bar{width:100px;}
  .bridge{padding:16px 14px;}
}
@media (max-width:640px){
  .site-hero{padding:70px 14px 34px;}
  .hero-title{font-size:30px;letter-spacing:4px;}
  .hero-volume{font-size:18px;letter-spacing:6px;}
  .hero-sub-cn{font-size:15px;letter-spacing:1.5px;}
  .hero-sub-en{font-size:12px;}
  .preface{padding:0 14px;}
  .preface p{font-size:15px;text-indent:1.8em;}
  .toc-section{padding:0 14px;}
  .toc-title{font-size:22px;letter-spacing:10px;}
  .ch-head{padding:26px 14px;}
  .ch-name{font-size:20px;letter-spacing:2px;}
  .ch-sub{font-size:13px;letter-spacing:1.5px;}
  .ch-body{padding:0 4px;}
  .bridge{padding:14px 12px;margin-bottom:18px;}
  .bridge p{font-size:16px;line-height:1.9;}
  .next-link{padding:12px 18px;font-size:13.5px;letter-spacing:1.5px;}
}
</style>

:root{

*{box-sizing:border-box;margin:0;padding:0}

/* Sidebar */
#sb{

.sb-head{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:3px;

.sb-nav{display:flex;flex-direction:column;gap:14px;align-items:center;width:100%;padding:0 6px}

/* Main */
.main{margin-left:var(--sbW);min-height:100vh;position:relative}

/* Hero */

}

}

.preface{

}

.toc-section{

.toc-title{font-size:28px;color:var(--accent);letter-spacing:14px;margin-bottom:8px;font-weight:700}
.toc-desc{

}

/* Chapter */
.chapter{max-width:1100px;margin:0 auto 32px;padding:0 28px;scroll-margin-top:20px}
.ch-head{
  background:var(--headGrad);color:#f4e5c6;padding:48px 32px 40px;border-radius:var(--r) var(--r) 0 0;
  text-align:center;position:relative;overflow:hidden;border-bottom:2px solid var(--gold);
}
.ch-head::after{
  content:&quot;&quot;;position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
  width:80px;height:1px;background:var(--gold);
}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12.5px;letter-spacing:4px;

.ch-body{

}
.ch-body &gt; *:first-child{margin-top:0}

/* Bridge */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:0;
}
.bridge-label{
  display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;

  letter-spacing:2px;margin-bottom:10px;

/* Section titles */
h2{
  position:relative;font-size:22px;font-weight:700;color:var(--accent);
  margin:36px 0 18px;padding:12px 18px 12px 22px;border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent 60%);
  letter-spacing:2px;line-height:1.5;
}
h2::before{
  content:attr(data-num);display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:12.5px;letter-spacing:3px;background:var(--gold);color:#fff;
  padding:2px 10px;border-radius:10px;margin-right:14px;vertical-align:middle;

}

.ch-body p{margin:0 0 14px;text-indent:2em;line-height:2;color:var(--text)}

  padding-bottom:1px;}

/* Classical (經文/原典) */
.classical{

  padding:3px 14px;border-radius:4px;
}
.classical p, .classical .c-text{text-indent:2em;margin:0}

/* Verse */
.verse{
  background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:18px 26px;line-height:2;margin:20px auto;max-width:640px;
  text-align:center;white-space:normal;font-size:17.5px;letter-spacing:2px;color:var(--accent);
  border-radius:0 8px 8px 0;
}

/* QA */
.qa{margin:18px 0}
.qa .q, .qa .a{

  font-size:16.5px;
}
.qa .q{
  background:#eef2f7;border-left:4px solid #6a85a6;color:#1f3855;
}
.qa .a{
  background:#f8efe1;border-left:4px solid var(--accent);color:#3a2a18;
}
.qa .q::before{content:&quot;問　&quot;;color:#3c6091;font-weight:700;letter-spacing:3px;margin-right:6px}
.qa .a::before{content:&quot;答　&quot;;color:var(--accent);font-weight:700;letter-spacing:3px;margin-right:6px}

/* Note / Insight */
.note, .insight{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:16px 22px;margin:18px 0;box-shadow:0 1px 3px rgba(0,0,0,.04);
  position:relative;
}
.note{border-left:4px solid var(--accentL)}
.insight{border-left:4px solid var(--gold);background:linear-gradient(135deg,#fffcf0,#fff8e5)}

}
.note .n-title::before{content:&quot;◆&quot;;color:var(--accentL);font-size:11px}
.insight .n-title::before{content:&quot;✦&quot;;color:var(--gold);font-size:13px}
.note p, .insight p{margin:0;text-indent:0;line-height:2;font-size:16px;color:var(--text2)}

/* Progress capsule */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* Back to top */
#backTop{
  position:fixed;right:22px;bottom:70px;width:44px;height:44px;border-radius:50%;
  border:none;cursor:pointer;background:var(--accent);color:#fff;font-size:20px;
  display:none;align-items:center;justify-content:center;z-index:100;
  box-shadow:0 3px 10px rgba(0,0,0,.25);transition:all .25s;
}
#backTop:hover{background:var(--gold);transform:translateY(-2px)}
#backTop.show{display:flex}

/* Footer */
.site-footer{
  background:#1e1a14;color:#a89376;padding:38px 24px 30px;text-align:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;
  border-top:2px solid var(--gold);margin-top:40px;
}
.site-footer .ft-title{font-size:16px;color:var(--goldL);letter-spacing:6px;margin-bottom:10px}
.site-footer .ft-line{opacity:.75;margin:4px 0}

@media (max-width:900px){
  #sbToggle{
    display:flex;position:fixed;top:12px;left:12px;width:42px;height:42px;
    border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:22px;
    z-index:60;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  #sb{transform:translateX(-100%);transition:transform .3s;width:260px}
  #sb.open{transform:translateX(0)}
  .main{margin-left:0}
  .site-hero{padding:60px 22px 50px}
  .site-hero h1{font-size:32px;letter-spacing:5px}
  .site-hero .hero-sub{font-size:15px}
  .ch-head{padding:32px 20px 28px}
  .ch-name{font-size:22px;letter-spacing:3px}
  .ch-body{padding:28px 22px}
  h2{font-size:18px}
  .toc-grid{grid-template-columns:1fr}
}
@media (max-width:600px){
  body{font-size:15.5px}
  .verse{padding:14px 16px;font-size:15.5px}
  .classical{padding:18px 18px 16px}
}

html,body{margin:0;padding:0;background:transparent;
  overflow-x:hidden!important;overflow-y:hidden!important;
  max-width:100vw!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;
  font-style:normal!important;
  box-sizing:border-box!important;}
body{padding:0 6px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img,video,iframe,table{max-width:100%!important;height:auto;}
img{-webkit-user-drag:none!important;pointer-events:none;}
.ch-body{background:var(--bg,#f7f3ec)!important;max-width:100%!important;margin:0 auto!important;}
/* 防止橫向溢位：所有區塊以中文逐字斷行為原則 */
.ch-body, .ch-body *{max-width:100%!important;}
p, li, div, span, td, th, h1, h2, h3, h4, h5, h6, a,
.card, .col, .flow, .note, .gatha, .verse, .inner-toc,
.insight, .commentary, .practice, .metaphor, .quote,
.classical-text, .section-content, .bridge, .callout, .highlight{
  overflow-wrap:break-word!important;
  word-break:break-word!important;
}
pre, code{white-space:pre-wrap!important;word-break:break-all!important;}
table{table-layout:fixed!important;width:100%!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}
.toc-section, .toc{background:transparent!important;}
.card,.col,.flow,.compare-table,.insight,.commentary,.practice,.metaphor,.note{background:var(--card,#fffdf7)!important;}
/* 注意：不要覆寫 .card-title / .col-title / .text-label 顏色。
   這類元素在多數來源檔中是有色底 + 白字膠囊，任意改字色會造成底字同色看不清。 */
/* 加大正文字級，降低長時間閱讀疲勞 */
html,body{font-size:19px!important;line-height:1.95!important;}
.ch-body, .ch-body p, .ch-body li{font-size:19px!important;line-height:2!important;}
.ch-body h2{font-size:23px!important;line-height:1.7!important;}
.ch-body h3{font-size:19.5px!important;line-height:1.7!important;}
.ch-body h4{font-size:18px!important;}
.card-content,.col-content,.section-content,
.card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
.classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
  font-size:19px!important;line-height:2!important;
}
.gatha,.verse,.verse p{font-size:20.5px!important;line-height:2.2!important;}
.qa .q, .qa .a, .qa-2, .qa-3{font-size:19px!important;line-height:2!important;}
.inner-toc ol li{font-size:16px!important;}
.toc-name{font-size:17px!important;}
.toc-desc{font-size:14.5px!important;}
small, .small, .text-small{font-size:15px!important;}
.ch-head{background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;color:#fff!important;text-align:center!important;}
.ch-head *{color:#fff!important;}
.gatha,.verse{font-size:19px!important;line-height:2.2!important;text-align:center!important;}
.text-label{display:block!important;margin-bottom:8px!important;}
/* 壓縮 iframe 底部長空白：最末元素不保留 margin/padding */
body &gt; *:last-child, .ch-body &gt; *:last-child, .ch-body section:last-child,
section:last-child &gt; *:last-child{margin-bottom:0!important;padding-bottom:0!important;}
.ch-body{padding-bottom:0!important;}
section{padding-bottom:0!important;}
/* 手機窄螢幕專用（保持足夠字級，避免疲勞） */
@media (max-width:640px){
  body{padding:0 4px!important;font-size:17.5px!important;}
  .ch-body{padding:18px 10px 6px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17.5px!important;line-height:1.95!important;}
  .ch-body h1{font-size:23px!important;letter-spacing:2px!important;}
  .ch-body h2{font-size:20px!important;letter-spacing:1.5px!important;padding:8px 0 8px 14px!important;line-height:1.6!important;}
  .ch-body h3{font-size:18px!important;letter-spacing:1px!important;}
  .ch-body h4{font-size:16.5px!important;}
  .ch-head{padding:28px 14px!important;}
  .ch-name{font-size:22px!important;letter-spacing:3px!important;}
  .card, .insight, .commentary, .practice, .metaphor, .note, .col{padding:14px 16px!important;margin:12px 0!important;}
  .card-content,.col-content,.section-content,
  .card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
  .classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
    font-size:17.5px!important;line-height:1.95!important;
  }
  .gatha, .verse, blockquote{font-size:18.5px!important;padding:14px 16px!important;line-height:2.1!important;}
  .section-title, .card-title{letter-spacing:1px!important;}
  .inner-toc{padding:14px 14px!important;}
  .inner-toc ol{grid-template-columns:1fr!important;gap:4px 0!important;}
  .inner-toc ol li{font-size:15.5px!important;}
  .four-grid, .two-col, .three-col, .grid-4, .debate, .flow{grid-template-columns:1fr!important;display:block!important;}
  .flow{flex-direction:column!important;}
  /* 英文長詞強制斷行 */
  p, li, div{overflow-wrap:anywhere!important;}
}
@media (max-width:420px){
  body{font-size:17px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17px!important;}
  .ch-body h2{font-size:19px!important;}
  .ch-body{padding:14px 8px 4px!important;}
}

  text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.flow-box small{color:var(--text-muted);font-size:12px;display:block;margin-top:3px;}
.flow-arrow{color:var(--gold);font-size:18px;font-weight:700;}

.flow.flow-v{flex-direction:column;}
.flow-step{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:12px 20px;font-size:15px;color:var(--text);
  min-width:260px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.flow-step small{color:var(--text-muted);font-size:12.5px;display:block;margin-top:4px;}
.flow-step.highlight{background:linear-gradient(135deg,#fdf5d5,#f6e9a6);border-color:var(--gold);}

/* 矩陣 */
.matrix-table{
  width:100%;border-collapse:collapse;margin:16px 0;
  background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;
}
.matrix-table th,.matrix-table td{
  padding:10px 14px;border:1px solid var(--border-light);text-align:left;
  font-size:14.5px;
}
.matrix-table th{
  background:rgba(184,134,11,.12);color:var(--accent);font-weight:600;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:1px;
}
.matrix-table td.num{text-align:center;color:var(--gold);font-weight:700;}

/* 光譜 */
.spectrum{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(90deg,#e8d8b8,#f5e8c8,#e8d8b8);
  padding:16px 22px;border-radius:8px;margin:16px 0;
  border:1px solid var(--border);
}
.spectrum .sp-end{
  font-weight:700;color:var(--accent);font-size:15px;
  background:#fff;padding:6px 14px;border-radius:20px;border:1px solid var(--border);
}
.spectrum .sp-mid{color:var(--gold);font-weight:700;font-size:15px;}

/* 反駁格 */
.refutation-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;
}
.ref-cell{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:14px 20px;position:relative;
}
.ref-cell.no{border-left:4px solid #b24a4a;}
.ref-cell.yes{border-left:4px solid #6a8f6a;}
.ref-cell .mark{
  position:absolute;top:-10px;right:12px;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#fff;font-size:14px;
}
.ref-cell.no .mark{background:#b24a4a;}
.ref-cell.yes .mark{background:#6a8f6a;}

/* 口訣 */
.mnemonic{
  background:linear-gradient(135deg,#fff5d8,#f5e6a8);
  border:2px solid var(--gold);border-radius:12px;
  padding:22px 28px;margin:20px 0;text-align:center;
  box-shadow:0 4px 16px rgba(184,134,11,.18);
}
.mnemonic-title{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;letter-spacing:5px;
  color:var(--accent);margin-bottom:16px;
}
.mnemonic-verse{
  font-size:20px;font-weight:700;line-height:2.4;color:var(--primary);
  letter-spacing:3px;
}
.mnemonic-verse span{display:block;}
.mnemonic-gloss{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12.5px;color:var(--accent);
  margin-top:14px;letter-spacing:2px;
}

/* phase 標籤 */
.phase-badge{
  display:inline-block;padding:3px 10px;border-radius:12px;
  background:var(--gold);color:#fff;font-size:12px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:1.5px;margin-right:6px;
}

/* next link */
.next-link{
  display:block;text-align:center;margin:30px 0 20px;
  padding:12px;color:var(--accent);font-family:&quot;Noto Sans TC&quot;,sans-serif;
  letter-spacing:3px;font-size:14px;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}

/* 底部進度條 */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
}
.read-progress .rp-bar{
  width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;
}
.read-progress .rp-fill{
  position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;
}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* 回頂按鈕 */
#backTop{
  position:fixed;right:24px;bottom:70px;z-index:100;
  width:44px;height:44px;border-radius:50%;border:0;
  background:var(--primary);color:var(--goldL);
  font-size:20px;cursor:pointer;display:none;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
}
#backTop.show{display:block;}

/* footer */
.site-footer{
  background:#1a1610;color:#a89880;padding:40px 30px 30px;
  text-align:center;margin-top:60px;
}
.site-footer .ft-title{
  color:var(--goldL);font-size:15px;letter-spacing:5px;margin-bottom:10px;
}
.site-footer .ft-line{
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;
  letter-spacing:2px;color:#6b6050;margin:6px 0;
}

/* 響應式 */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .ch-body{padding:30px 18px 20px;}
  .hero-title{font-size:34px;letter-spacing:2px;}
  .hero-sub{font-size:16px;}
  .two-col,.three-col,.four-grid,.refutation-grid{grid-template-columns:1fr;}
  .flow-step{min-width:auto;width:100%;}
  .ch-head{padding:36px 20px;}
  .ch-name{font-size:24px;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:28px;}
  .ch-body h2{font-size:19px;}
  .ch-body h3{font-size:17px;}
  .mnemonic-verse{font-size:17px;letter-spacing:2px;}
}

html,body{margin:0;padding:0;background:transparent;
  overflow-x:hidden!important;overflow-y:hidden!important;
  max-width:100vw!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;
  font-style:normal!important;
  box-sizing:border-box!important;}
body{padding:0 6px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img,video,iframe,table{max-width:100%!important;height:auto;}
img{-webkit-user-drag:none!important;pointer-events:none;}
.ch-body{background:var(--bg,#f7f3ec)!important;max-width:100%!important;margin:0 auto!important;}
/* 防止橫向溢位：所有區塊以中文逐字斷行為原則 */
.ch-body, .ch-body *{max-width:100%!important;}
p, li, div, span, td, th, h1, h2, h3, h4, h5, h6, a,
.card, .col, .flow, .note, .gatha, .verse, .inner-toc,
.insight, .commentary, .practice, .metaphor, .quote,
.classical-text, .section-content, .bridge, .callout, .highlight{
  overflow-wrap:break-word!important;
  word-break:break-word!important;
}
pre, code{white-space:pre-wrap!important;word-break:break-all!important;}
table{table-layout:fixed!important;width:100%!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}
.toc-section, .toc{background:transparent!important;}
.card,.col,.flow,.compare-table,.insight,.commentary,.practice,.metaphor,.note{background:var(--card,#fffdf7)!important;}
/* 注意：不要覆寫 .card-title / .col-title / .text-label 顏色。
   這類元素在多數來源檔中是有色底 + 白字膠囊，任意改字色會造成底字同色看不清。 */
/* 加大正文字級，降低長時間閱讀疲勞 */
html,body{font-size:19px!important;line-height:1.95!important;}
.ch-body, .ch-body p, .ch-body li{font-size:19px!important;line-height:2!important;}
.ch-body h2{font-size:23px!important;line-height:1.7!important;}
.ch-body h3{font-size:19.5px!important;line-height:1.7!important;}
.ch-body h4{font-size:18px!important;}
.card-content,.col-content,.section-content,
.card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
.classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
  font-size:19px!important;line-height:2!important;
}
.gatha,.verse,.verse p{font-size:20.5px!important;line-height:2.2!important;}
.qa .q, .qa .a, .qa-2, .qa-3{font-size:19px!important;line-height:2!important;}
.inner-toc ol li{font-size:16px!important;}
.toc-name{font-size:17px!important;}
.toc-desc{font-size:14.5px!important;}
small, .small, .text-small{font-size:15px!important;}
.ch-head{background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;color:#fff!important;text-align:center!important;}
.ch-head *{color:#fff!important;}
.gatha,.verse{font-size:19px!important;line-height:2.2!important;text-align:center!important;}
.text-label{display:block!important;margin-bottom:8px!important;}
/* 壓縮 iframe 底部長空白：最末元素不保留 margin/padding */
body &gt; *:last-child, .ch-body &gt; *:last-child, .ch-body section:last-child,
section:last-child &gt; *:last-child{margin-bottom:0!important;padding-bottom:0!important;}
.ch-body{padding-bottom:0!important;}
section{padding-bottom:0!important;}
/* 手機窄螢幕專用（保持足夠字級，避免疲勞） */
@media (max-width:640px){
  body{padding:0 4px!important;font-size:17.5px!important;}
  .ch-body{padding:18px 10px 6px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17.5px!important;line-height:1.95!important;}
  .ch-body h1{font-size:23px!important;letter-spacing:2px!important;}
  .ch-body h2{font-size:20px!important;letter-spacing:1.5px!important;padding:8px 0 8px 14px!important;line-height:1.6!important;}
  .ch-body h3{font-size:18px!important;letter-spacing:1px!important;}
  .ch-body h4{font-size:16.5px!important;}
  .ch-head{padding:28px 14px!important;}
  .ch-name{font-size:22px!important;letter-spacing:3px!important;}
  .card, .insight, .commentary, .practice, .metaphor, .note, .col{padding:14px 16px!important;margin:12px 0!important;}
  .card-content,.col-content,.section-content,
  .card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
  .classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
    font-size:17.5px!important;line-height:1.95!important;
  }
  .gatha, .verse, blockquote{font-size:18.5px!important;padding:14px 16px!important;line-height:2.1!important;}
  .section-title, .card-title{letter-spacing:1px!important;}
  .inner-toc{padding:14px 14px!important;}
  .inner-toc ol{grid-template-columns:1fr!important;gap:4px 0!important;}
  .inner-toc ol li{font-size:15.5px!important;}
  .four-grid, .two-col, .three-col, .grid-4, .debate, .flow{grid-template-columns:1fr!important;display:block!important;}
  .flow{flex-direction:column!important;}
  /* 英文長詞強制斷行 */
  p, li, div{overflow-wrap:anywhere!important;}
}
@media (max-width:420px){
  body{font-size:17px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17px!important;}
  .ch-body h2{font-size:19px!important;}
  .ch-body{padding:14px 8px 4px!important;}
}

:root{

}
*{box-sizing:border-box;margin:0;padding:0;

/* TOC */
.toc-section{

}
.toc-desc{

  font-size:13px;letter-spacing:2px;margin-bottom:24px;
}
.toc-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;
}
.toc-card{
  display:flex;gap:14px;padding:14px 18px;background:#fffdf5;
  border:1px solid var(--border-light);border-radius:10px;
  text-decoration:none;color:var(--text);transition:all .3s;

}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px var(--shadow);border-color:var(--gold);}
.toc-num{

.chapter{margin:40px 0 24px;}
.ch-head{

}
.ch-head::after{

.ch-num{

  color:var(--goldL);margin-bottom:12px;
}
.ch-name{font-size:30px;font-weight:900;letter-spacing:4px;color:#fff;margin-bottom:8px;}
.ch-sub{font-size:14px;color:#d4c4a8;letter-spacing:2px;font-family:&quot;Noto Sans TC&quot;,sans-serif;}

.ch-body{
  max-width:860px;margin:0 auto;padding:36px 32px 20px;

}

h2{
  font-size:24px;font-weight:700;color:var(--accent);

  border-left:4px solid var(--gold);

  letter-spacing:1.5px;
}
h3{
  font-size:19px;font-weight:700;color:var(--text);
  margin:26px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border-light);
  letter-spacing:1px;
}
h4{font-size:16.5px;font-weight:700;color:var(--text2);margin:18px 0 10px;letter-spacing:.5px;}
h5{font-size:15px;font-weight:700;color:var(--gold);margin:12px 0 8px;font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:1px;}

p{margin:0 0 12px;line-height:1.95;}
p.indent{text-indent:2em;}

strong,b{color:var(--accent-red);font-weight:700;}
em{color:var(--accent);font-style:normal;font-weight:600;}

/* Bridge */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:20px 0 28px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:32px;
}
.bridge-label{
  display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2px;margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}
.bridge p + p{margin-top:10px;}

/* Classical text */
.classical-text{
  background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:20px 26px;margin:18px 0;line-height:2;position:relative;
}
.text-label{
  display:inline-block;background:var(--primary);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;letter-spacing:3px;
  padding:3px 14px;border-radius:4px;margin-bottom:12px;
}
.classical-text p{margin-bottom:10px;}
.classical-text p:last-child{margin-bottom:0;}

/* Verse / quotation */
.verse,.gatha,blockquote{
  background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:16px 24px;margin:18px 0;line-height:1.95;
  white-space:normal;text-align:center;color:var(--text);
  border-radius:0 6px 6px 0;font-size:17px;
}
.verse-cite{
  display:block;margin-top:8px;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;color:var(--text-muted);letter-spacing:2px;
}

/* Cards */
.card,.insight,.commentary,.practice,.metaphor,.note{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:16px 22px;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.card-title,.col-title,.insight-title{
  font-size:16px;font-weight:700;color:var(--accent);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;letter-spacing:1px;
}
.insight{border-left:4px solid var(--gold);}
.commentary{border-left:4px solid var(--accent);}

/* Q&amp;A */
.qa{margin:18px 0;}
.qa .q,.qa .a{
  padding:12px 18px;margin-bottom:10px;border-radius:8px;line-height:1.9;
}
.qa .q{background:#e8f0f5;border-left:4px solid #3a6080;color:#1e3a5f;}
.qa .a{background:#fff7e8;border-left:4px solid var(--accent);color:var(--text);}

/* Grids */
.four-grid,.two-col{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:18px 0;
}
.three-col{
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;
}
.col,.col-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;box-shadow:0 1px 4px var(--shadow);
}

/* Compare table */
.compare-table{
  width:100%;border-collapse:collapse;margin:20px 0;
  background:var(--card);border-radius:10px;overflow:hidden;
  box-shadow:0 2px 10px var(--shadow);
}
.compare-table th,.compare-table td{
  padding:14px 18px;border-bottom:1px solid var(--border-light);
  text-align:center;font-size:15.5px;
}
.compare-table th{
  background:var(--headGrad);color:#f7ecd4;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  letter-spacing:2px;font-weight:600;
}
.compare-table th:first-child{background:#1e1a14;}
.compare-table td:first-child{
  background:#f5ecd8;font-weight:700;color:var(--accent);font-family:&quot;Noto Sans TC&quot;,sans-serif;
}
.compare-table .col-shravaka{color:var(--text2);}
.compare-table .col-buddha{color:var(--accent-red);font-weight:600;}
.compare-table small{display:block;font-size:12px;color:var(--text-muted);margin-top:4px;font-family:&quot;Noto Sans TC&quot;,sans-serif;}

/* Flow / steps */
.flow{
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;margin:18px 0;
}
.flow-box,.flow-step{
  flex:1;min-width:130px;background:#fffdf5;border:1px solid var(--border);
  border-radius:8px;padding:12px 14px;text-align:center;font-size:14px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;color:var(--accent);font-weight:600;
  line-height:1.5;
}
.flow-box small,.flow-step small{display:block;font-size:11.5px;color:var(--text-muted);margin-top:4px;font-weight:400;}
.flow-arrow{font-size:22px;color:var(--gold);font-weight:700;}

/* Layered logic */
.layered{
  display:flex;flex-direction:column;gap:10px;margin:18px 0;
}
.layer{
  display:flex;gap:14px;align-items:stretch;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;box-shadow:0 1px 4px var(--shadow);
}
.layer-tag{
  flex-shrink:0;width:96px;padding:10px 8px;border-radius:6px;
  background:#e8e0cc;color:var(--accent);font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-weight:700;letter-spacing:2px;text-align:center;font-size:14px;
  display:flex;align-items:center;justify-content:center;line-height:1.4;
}
.layer.active .layer-tag{background:#c85a3c;color:#fff;box-shadow:0 0 14px rgba(200,90,60,.35);}
.layer-body{flex:1;padding:4px 0;}
.layer-body .layer-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:6px;}
.layer-body ul{padding-left:22px;margin:6px 0 0;color:var(--text2);font-size:15px;}
.layer-body ul li{margin-bottom:4px;line-height:1.8;}

/* Key quote */
.key-quote{
  background:linear-gradient(135deg,#f5ecd8,#fdf5e8);
  border:2px solid var(--gold);border-radius:12px;
  padding:22px 28px;margin:24px 0;text-align:center;
  box-shadow:0 3px 18px rgba(184,134,11,.15);
}
.key-quote .q-text{font-size:20px;line-height:1.9;color:var(--text);letter-spacing:1.5px;font-weight:600;}
.key-quote .q-cite{margin-top:10px;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;color:var(--text-muted);letter-spacing:2px;}

/* Journey (成佛旅程) */
.journey{
  background:linear-gradient(135deg,#fffdf7,#f7efdc);
  border:1px solid var(--border);border-radius:14px;
  padding:28px 24px;margin:24px 0;
  box-shadow:0 3px 14px var(--shadow);
}
.journey-title{
  text-align:center;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:5px;color:var(--gold);
  margin-bottom:20px;font-weight:600;
}
.journey-track{
  display:grid;grid-template-columns:repeat(5,1fr);gap:0;
  position:relative;
}
.journey-step{
  position:relative;text-align:center;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  padding:0 8px;display:flex;flex-direction:column;align-items:center;
}
.js-num{
  width:44px;height:44px;border-radius:50%;
  background:var(--headGrad);color:var(--goldL);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;
  border:3px solid #fff;
  box-shadow:0 0 0 2px var(--gold),0 3px 10px rgba(184,134,11,.25);
  position:relative;z-index:2;margin-bottom:14px;
  letter-spacing:0;
}
.journey-step:last-child .js-num{
  background:linear-gradient(135deg,var(--accent-red),#c85a3c);
  box-shadow:0 0 0 2px var(--accent-red),0 3px 14px rgba(139,37,0,.35);
  color:#fff;
}
.js-body{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px 10px;width:100%;
  min-height:98px;display:flex;flex-direction:column;justify-content:center;
  box-shadow:0 1px 4px var(--shadow);
}
.js-title{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:1.5px;margin-bottom:6px;line-height:1.4;}
.js-desc{font-size:12.5px;color:var(--text-muted);line-height:1.6;}
.journey-step:last-child .js-title{color:var(--accent-red);}
/* connector line behind circles */
.journey-track::before{
  content:&quot;&quot;;position:absolute;top:22px;left:10%;right:10%;height:3px;
  background:linear-gradient(90deg,var(--gold) 0%,var(--goldL) 50%,var(--accent-red) 100%);
  z-index:1;border-radius:2px;
}
/* small chevron between steps */
.journey-step:not(:last-child)::after{
  content:&quot;▶&quot;;position:absolute;top:14px;right:-7px;
  color:var(--accent-red);font-size:12px;z-index:3;
}
.journey-caption{
  margin-top:22px;padding:14px 18px;
  background:#fdf5e8;border-left:4px solid var(--accent-red);
  border-radius:6px;color:var(--text2);font-size:14.5px;line-height:1.9;
}

/* Spectrum / boundary */
.boundary-diagram{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:22px 26px;margin:20px 0;
}
.boundary-row{
  display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;
  margin-bottom:14px;
}
.boundary-box{
  background:#f5ecd8;border:1px solid var(--border);border-radius:8px;padding:12px 14px;
  font-size:14px;color:var(--text);line-height:1.7;
}
.boundary-box.past{background:linear-gradient(135deg,#e8ddc8,#f0e5d0);border-left:4px solid var(--text2);}
.boundary-box.future{background:linear-gradient(135deg,#e5ecdf,#eff3e6);border-left:4px solid #6a8a5e;}
.boundary-center{
  width:80px;height:80px;border-radius:50%;background:var(--headGrad);
  display:flex;align-items:center;justify-content:center;color:var(--goldL);
  font-weight:900;font-size:17px;letter-spacing:2px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
}
.boundary-note{
  background:#fdf5e8;border-left:4px solid var(--accent-red);
  padding:10px 16px;color:var(--text2);font-size:14.5px;line-height:1.8;
  border-radius:4px;
}

/* Chain */
.chain{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px;
  margin:20px 0;padding:16px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;
}
.chain-node{
  background:#f5ecd8;border:1px solid var(--border);border-radius:20px;
  padding:8px 16px;font-size:13.5px;color:var(--accent);font-weight:600;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;letter-spacing:1px;text-align:center;
  min-width:110px;
}
.chain-node small{display:block;font-size:11px;color:var(--text-muted);font-weight:400;margin-top:2px;}
.chain-arrow{color:var(--gold);font-size:16px;font-weight:700;}

/* Formula */
.formula{
  background:linear-gradient(135deg,#fdf5e8,#f5ecd8);
  border:1px solid var(--border);border-radius:10px;
  padding:22px 24px;margin:18px 0;text-align:center;
  font-size:19px;line-height:1.9;color:var(--text);letter-spacing:1.5px;
  font-weight:600;
}
.formula .plus,.formula .eq{color:var(--accent-red);margin:0 8px;font-weight:700;}
.formula .item{padding:4px 12px;background:#fff;border-radius:6px;border:1px solid var(--border);display:inline-block;margin:4px 2px;}
.formula .result{background:var(--accent-red);color:#fff;padding:4px 14px;border-radius:6px;font-weight:700;}

/* Mnemonic */
.mnemonic{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0;
}
.mnem-card{
  background:linear-gradient(135deg,var(--card),#fdf5e8);
  border:1px solid var(--border);border-radius:10px;
  padding:20px 16px;text-align:center;box-shadow:0 2px 8px var(--shadow);
}
.mnem-icon{font-size:26px;margin-bottom:8px;}
.mnem-phrase{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-bottom:8px;line-height:1.5;}
.mnem-note{font-size:12px;color:var(--text-muted);font-family:&quot;Noto Sans TC&quot;,sans-serif;line-height:1.6;}

/* Progress capsule */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:8px 22px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* Back top */
#backTop{
  position:fixed;right:20px;bottom:70px;width:44px;height:44px;
  border-radius:50%;border:none;cursor:pointer;
  background:var(--headGrad);color:var(--goldL);font-size:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.25);display:none;z-index:110;
  border:1px solid rgba(184,134,11,.4);
}
#backTop.show{display:block;}

/* Footer */
.site-footer{
  background:var(--sbBg);color:var(--sbText);text-align:center;
  padding:40px 30px 70px;margin-top:50px;
}
.site-footer h3{color:var(--goldL);font-size:18px;margin-bottom:12px;letter-spacing:3px;border:none;padding:0;}
.site-footer p{color:rgba(212,196,168,.75);font-size:13.5px;line-height:1.9;font-family:&quot;Noto Sans TC&quot;,sans-serif;}

/* Responsive */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.show{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:60px 22px 50px;}
  .hero-title{font-size:32px;letter-spacing:4px;}
  .ch-head{padding:32px 22px;}
  .ch-name{font-size:22px;letter-spacing:2px;}
  .ch-body{padding:24px 18px;}
  .four-grid,.two-col,.three-col,.mnemonic{grid-template-columns:1fr;}
  .boundary-row{grid-template-columns:1fr;}
  .journey-track{grid-template-columns:1fr;gap:10px;}
  .journey-track::before{display:none;}
  .journey-step::after{display:none;}
  .journey-step{flex-direction:row;text-align:left;gap:14px;align-items:center;}
  .js-num{margin-bottom:0;flex-shrink:0;}
  .js-body{min-height:auto;text-align:left;}
  .layer{flex-direction:column;}
  .layer-tag{width:100%;}
}
@media (max-width:600px){
  body{font-size:15.5px;}
  .hero-title{font-size:26px;}
  h2{font-size:20px;}
  h3{font-size:17px;}
  .key-quote .q-text{font-size:16.5px;}
}

.ch-head::after{content:&quot;&quot;;position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  width:60px;height:2px;background:var(--goldL);}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12px;color:var(--goldL);
  letter-spacing:6px;margin-bottom:10px;}
.ch-name{font-size:32px;font-weight:700;color:#fff;letter-spacing:4px;margin-bottom:8px;}
.ch-sub{font-size:14px;color:#d4c4a8;letter-spacing:3px;opacity:.85;font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.ch-body{max-width:880px;margin:32px auto 0;padding:0 32px;}

/* ===== 橋接 ===== */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);border-radius:10px;
  padding:18px 24px;margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 6px;color:var(--text2);line-height:2;font-size:15.5px;}
.bridge p:last-child{margin-bottom:0;}

/* ===== 正文元素 ===== */
h2{font-size:22px;font-weight:700;color:var(--accent);
  margin:32px 0 14px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);
  letter-spacing:2px;}
h3{font-size:18px;font-weight:600;color:var(--text);margin:24px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--border-light);letter-spacing:1px;}
h4{font-size:16px;font-weight:600;color:var(--text2);margin:18px 0 8px;}
h5{font-size:15px;font-weight:600;color:var(--gold);margin:14px 0 6px;}
p{margin:0 0 12px;text-align:justify;}
.qa-2{padding-left:2em;}
.qa-3{padding-left:3em;}

/* ===== 經典原文 ===== */
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:18px 24px;margin:16px 0;line-height:1.95;position:relative;}
.text-label{display:inline-block;background:var(--primary);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:3px;
  padding:3px 12px;border-radius:3px;margin-bottom:12px;}

/* ===== 偈頌 ===== */
.verse,.gatha{background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:16px 24px;margin:18px 0;line-height:2.2;white-space:normal;
  text-align:center;border-radius:6px;font-size:18px;color:var(--accent);font-weight:500;}
.verse em,.gatha em{font-style:normal;}

/* ===== 卡片 ===== */
.card,.insight,.commentary,.practice,.metaphor,.note{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:16px 22px;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.card-title{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:1px;}
.insight{border-left:4px solid var(--gold);}
.commentary{border-left:4px solid var(--accentL);}
.practice{border-left:4px solid #6a8a5e;background:linear-gradient(135deg,#fffdf7,#f0f5e8);}
.metaphor{border-left:4px solid #a87c5e;background:linear-gradient(135deg,#fffdf7,#f5ece0);}
.note{border-left:4px solid var(--accent-red);font-size:15px;color:var(--text2);}
strong,b{color:var(--accent-red);font-weight:700;}

/* ===== 問答 ===== */
.qa{margin:18px 0;}
.qa .q{background:linear-gradient(135deg,#f0f4f8,#e8eef5);
  border-left:4px solid #4a6fa5;padding:12px 20px;margin-bottom:10px;border-radius:6px;
  color:#2c3e50;}
.qa .q::before{content:&quot;問　&quot;;color:#4a6fa5;font-weight:700;letter-spacing:2px;}
.qa .a{background:linear-gradient(135deg,#fdf8e8,#f5ecd0);
  border-left:4px solid var(--accent);padding:12px 20px;border-radius:6px;color:var(--text);}
.qa .a::before{content:&quot;答　&quot;;color:var(--accent-red);font-weight:700;letter-spacing:2px;}

/* ===== 格線 ===== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0;}
.four-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.col-card{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:16px 18px;}
.col-title{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:1px;}
.col-content{font-size:16px;color:var(--text);}

/* ===== 三段論 ===== */
.syllogism{margin:20px 0;}
.syll-step{background:var(--card);border:1.5px solid var(--border);border-radius:8px;
  padding:14px 20px;margin:10px 0;position:relative;}
.syll-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;
  background:var(--primary-light);color:#fff;padding:2px 10px;border-radius:3px;
  letter-spacing:2px;margin-bottom:6px;}
.syll-conclusion{background:linear-gradient(135deg,#e8f0e0,#d8e8d0);
  border:1.5px solid #6a8a5e;}
.syll-conclusion .syll-label{background:#6a8a5e;}
.syll-arrow{text-align:center;color:var(--gold);font-size:20px;margin:4px 0;}

/* ===== 對比表 ===== */
.compare-table{width:100%;border-collapse:collapse;margin:18px 0;
  background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.compare-table th{background:var(--primary);color:#fff;padding:12px 16px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:2px;text-align:center;}
.compare-table td{padding:14px 18px;border-top:1px solid var(--border-light);
  vertical-align:top;font-size:15.5px;}
.compare-table tr:nth-child(even) td{background:rgba(212,196,168,.08);}
.compare-table .t-label{font-weight:700;color:var(--accent);text-align:center;width:22%;}

/* ===== 流程 ===== */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px;
  padding:18px;background:var(--card);border:1px dashed var(--border);
  border-radius:10px;margin:18px 0;}
.flow-box,.flow-step{background:linear-gradient(135deg,#fdf8e8,#f5ecd0);
  border:1.5px solid var(--gold);border-radius:8px;padding:10px 18px;
  font-size:14.5px;color:var(--accent);font-weight:600;text-align:center;min-width:120px;}
.flow-arrow{color:var(--gold);font-size:20px;font-weight:bold;}
.flow-v{flex-direction:column;}

/* ===== 光譜 ===== */
.spectrum{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:22px 26px;margin:20px 0;}
.spectrum-line{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 0;}
.spec-end{flex:0 0 auto;padding:10px 16px;background:#f0e8e0;border:1px solid var(--border);
  border-radius:8px;font-size:13.5px;color:var(--text-muted);position:relative;}
.spec-end::before{content:&quot;✘&quot;;color:var(--accent-red);font-weight:700;margin-right:6px;}
.spec-bar{flex:1;height:3px;background:linear-gradient(90deg,var(--accent-red),var(--gold),var(--accent-red));
  position:relative;}
.spec-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--gold);color:#fff;padding:6px 14px;border-radius:14px;font-size:13px;font-weight:700;white-space:nowrap;}

/* ===== 階梯 ===== */
.ladder{margin:20px 0;}
.ladder-item{display:flex;align-items:stretch;margin:8px 0;
  background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.05);}
.ladder-num{flex:0 0 80px;background:var(--headGrad);color:var(--goldL);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;padding:12px;font-size:12px;letter-spacing:2px;}
.ladder-num .ln-big{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;}
.ladder-content{flex:1;padding:14px 18px;}
.ladder-title{font-weight:700;color:var(--accent);font-size:15.5px;margin-bottom:4px;letter-spacing:1px;}
.ladder-desc{font-size:14.5px;color:var(--text2);line-height:1.8;}

/* ===== 回頂按鈕 ===== */
#backTop{position:fixed;right:24px;bottom:80px;width:44px;height:44px;border-radius:50%;
  background:var(--primary);color:#fff;border:none;font-size:20px;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.2);display:none;z-index:90;}
#backTop.show{display:block;}

/* ===== Footer ===== */
.site-footer{background:var(--sbBg);color:#9a8a70;text-align:center;
  padding:30px 20px;margin-top:40px;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px;letter-spacing:3px;}
.site-footer .f-title{color:var(--goldL);font-size:14px;margin-bottom:8px;letter-spacing:4px;}

/* ===== 響應式 ===== */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .site-hero{padding:60px 20px 50px;}
  .site-hero h1{font-size:32px;letter-spacing:2px;}
  .site-hero .hero-sub{font-size:15px;letter-spacing:4px;}
  .ch-head{padding:32px 20px;}
  .ch-name{font-size:24px;letter-spacing:2px;}
  .ch-body{padding:0 20px;}
  .toc-section{padding:0 20px;}
  .preface{padding:0 20px;}
  .two-col,.three-col,.four-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:15.5px;}
  .site-hero h1{font-size:26px;}
  .ch-name{font-size:20px;}
  h2{font-size:18px;}
  .ladder-item{flex-direction:column;}
  .ladder-num{flex:none;flex-direction:row;gap:10px;padding:8px;}
}

html,body{margin:0;padding:0;background:transparent;
  overflow-x:hidden!important;overflow-y:hidden!important;
  max-width:100vw!important;
  scrollbar-width:none!important;-ms-overflow-style:none!important;
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;}
html::-webkit-scrollbar,body::-webkit-scrollbar,
*::-webkit-scrollbar{display:none!important;width:0!important;height:0!important;}
*{-webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-user-drag:none!important;
  scrollbar-width:none!important;
  font-style:normal!important;
  box-sizing:border-box!important;}
body{padding:0 6px;}
#sb,#sbToggle,#backTop,aside.sb{display:none!important;}
.main{margin-left:0!important;}
img,video,iframe,table{max-width:100%!important;height:auto;}
img{-webkit-user-drag:none!important;pointer-events:none;}
.ch-body{background:var(--bg,#f7f3ec)!important;max-width:100%!important;margin:0 auto!important;}
/* 防止橫向溢位：所有區塊以中文逐字斷行為原則 */
.ch-body, .ch-body *{max-width:100%!important;}
p, li, div, span, td, th, h1, h2, h3, h4, h5, h6, a,
.card, .col, .flow, .note, .gatha, .verse, .inner-toc,
.insight, .commentary, .practice, .metaphor, .quote,
.classical-text, .section-content, .bridge, .callout, .highlight{
  overflow-wrap:break-word!important;
  word-break:break-word!important;
}
pre, code{white-space:pre-wrap!important;word-break:break-all!important;}
table{table-layout:fixed!important;width:100%!important;}
.toc-title,.toc-desc,.toc-header{text-align:center!important;}
.toc-section, .toc{background:transparent!important;}
.card,.col,.flow,.compare-table,.insight,.commentary,.practice,.metaphor,.note{background:var(--card,#fffdf7)!important;}
/* 注意：不要覆寫 .card-title / .col-title / .text-label 顏色。
   這類元素在多數來源檔中是有色底 + 白字膠囊，任意改字色會造成底字同色看不清。 */
/* 加大正文字級，降低長時間閱讀疲勞 */
html,body{font-size:19px!important;line-height:1.95!important;}
.ch-body, .ch-body p, .ch-body li{font-size:19px!important;line-height:2!important;}
.ch-body h2{font-size:23px!important;line-height:1.7!important;}
.ch-body h3{font-size:19.5px!important;line-height:1.7!important;}
.ch-body h4{font-size:18px!important;}
.card-content,.col-content,.section-content,
.card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
.classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
  font-size:19px!important;line-height:2!important;
}
.gatha,.verse,.verse p{font-size:20.5px!important;line-height:2.2!important;}
.qa .q, .qa .a, .qa-2, .qa-3{font-size:19px!important;line-height:2!important;}
.inner-toc ol li{font-size:16px!important;}
.toc-name{font-size:17px!important;}
.toc-desc{font-size:14.5px!important;}
small, .small, .text-small{font-size:15px!important;}
.ch-head{background:var(--headGrad,linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%))!important;color:#fff!important;text-align:center!important;}
.ch-head *{color:#fff!important;}
.gatha,.verse{font-size:19px!important;line-height:2.2!important;text-align:center!important;}
.text-label{display:block!important;margin-bottom:8px!important;}
/* 壓縮 iframe 底部長空白：最末元素不保留 margin/padding */
body &gt; *:last-child, .ch-body &gt; *:last-child, .ch-body section:last-child,
section:last-child &gt; *:last-child{margin-bottom:0!important;padding-bottom:0!important;}
.ch-body{padding-bottom:0!important;}
section{padding-bottom:0!important;}
/* 手機窄螢幕專用（保持足夠字級，避免疲勞） */
@media (max-width:640px){
  body{padding:0 4px!important;font-size:17.5px!important;}
  .ch-body{padding:18px 10px 6px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17.5px!important;line-height:1.95!important;}
  .ch-body h1{font-size:23px!important;letter-spacing:2px!important;}
  .ch-body h2{font-size:20px!important;letter-spacing:1.5px!important;padding:8px 0 8px 14px!important;line-height:1.6!important;}
  .ch-body h3{font-size:18px!important;letter-spacing:1px!important;}
  .ch-body h4{font-size:16.5px!important;}
  .ch-head{padding:28px 14px!important;}
  .ch-name{font-size:22px!important;letter-spacing:3px!important;}
  .card, .insight, .commentary, .practice, .metaphor, .note, .col{padding:14px 16px!important;margin:12px 0!important;}
  .card-content,.col-content,.section-content,
  .card p,.col p,.insight p,.commentary p,.practice p,.metaphor p,.note p,
  .classical-text, .classical-text p, .bridge p, blockquote, blockquote p{
    font-size:17.5px!important;line-height:1.95!important;
  }
  .gatha, .verse, blockquote{font-size:18.5px!important;padding:14px 16px!important;line-height:2.1!important;}
  .section-title, .card-title{letter-spacing:1px!important;}
  .inner-toc{padding:14px 14px!important;}
  .inner-toc ol{grid-template-columns:1fr!important;gap:4px 0!important;}
  .inner-toc ol li{font-size:15.5px!important;}
  .four-grid, .two-col, .three-col, .grid-4, .debate, .flow{grid-template-columns:1fr!important;display:block!important;}
  .flow{flex-direction:column!important;}
  /* 英文長詞強制斷行 */
  p, li, div{overflow-wrap:anywhere!important;}
}
@media (max-width:420px){
  body{font-size:17px!important;}
  .ch-body, .ch-body p, .ch-body li{font-size:17px!important;}
  .ch-body h2{font-size:19px!important;}
  .ch-body{padding:14px 8px 4px!important;}
}

  display:inline-block; background:#2a2218; color:#f4d98a;
  font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:12px; letter-spacing:3px;
  padding:3px 14px; border-radius:4px; margin-bottom:12px;
}
.classical-text p{font-size:16px; color:var(--text); line-height:2.1; margin-bottom:10px; text-align:justify;}
.classical-text p:last-child{margin-bottom:0;}
.classical-text .note{color:var(--text-muted); font-size:13.5px;}

.verse{
  background:var(--verseBg); border-left:4px solid var(--verseBd);
  padding:18px 26px; margin:18px 0; line-height:2.2;
  white-space:normal; text-align:center; font-size:18px;
  color:var(--accent); font-weight:600; letter-spacing:2px;
  border-radius:0 8px 8px 0;
}
.verse .verse-line{display:block;}

/* Cards */
.card, .insight, .commentary, .note-card{
  background:var(--card); border:1px solid var(--border);
  border-radius:8px; padding:16px 22px; margin:14px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.card-title{color:var(--accent); font-size:16px; font-weight:700; margin-bottom:8px; letter-spacing:1.5px;}
.insight{border-left:4px solid var(--gold); background:linear-gradient(135deg,#fffdf5,#faf2dc);}
.insight .card-title{color:var(--accent-red);}

/* QA */
.qa{margin:16px 0;}
.qa .q{
  background:#e8f0f5; border-left:4px solid #5a8fb0; padding:12px 18px;
  margin-bottom:10px; color:#2c4a5c; font-weight:600; border-radius:0 6px 6px 0;
}
.qa .a{
  background:#f5ede0; border-left:4px solid var(--accent); padding:12px 18px;
  color:var(--text); border-radius:0 6px 6px 0;
}

/* Grids */
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:18px 0;}
.three-col{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin:18px 0;}
.four-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:18px 0;}
.col-card{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:16px 20px; box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.col-title{color:var(--accent); font-weight:700; font-size:16px; margin-bottom:8px; letter-spacing:1.5px;}
.col-title.red{color:var(--accent-red);}
.col-title.blue{color:#3d6a89;}
.col-title.green{color:#527a53;}
.col-card ul{margin:6px 0 0; padding-left:20px;}
.col-card li{margin:4px 0; font-size:15px; color:var(--text2); line-height:1.85;}

/* Flow */
.flow{
  display:flex; flex-wrap:wrap; align-items:center; justify-content:center;
  gap:10px; padding:16px 8px; background:#fdf8ec;
  border:1px dashed var(--border); border-radius:10px; margin:18px 0;
}
.flow-box{
  background:var(--card); border:1.5px solid var(--gold);
  padding:10px 16px; border-radius:8px; font-size:14.5px;
  color:var(--text); font-weight:600; min-width:92px; text-align:center;
}
.flow-box small{display:block; font-weight:400; color:var(--text-muted); font-size:12px; margin-top:3px;}
.flow-arrow{color:var(--gold); font-size:20px; font-weight:700;}

.flow-v{flex-direction:column;}
.flow-v .flow-arrow{font-size:22px;}

/* Roadmap */
.roadmap{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px; margin:18px 0;
}
.roadmap-step{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; text-align:center;
}
.roadmap-step .rm-num{
  display:inline-block; width:30px; height:30px; line-height:28px;
  border-radius:50%; background:var(--gold); color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif; font-weight:700; font-size:14px;
  margin-bottom:8px;
}
.roadmap-step .rm-title{color:var(--accent); font-weight:700; font-size:15px; margin-bottom:4px;}
.roadmap-step .rm-desc{color:var(--text-muted); font-size:13px; line-height:1.7;}

/* Matrix grid (2x2 quadrants) */
.matrix-wrap{
  margin:22px 0; background:#fffdf5;
  border:1px solid var(--border); border-radius:14px;
  box-shadow:0 4px 18px rgba(91,58,41,.08); overflow:hidden;
}
.matrix-axis-top{
  display:grid; grid-template-columns:1fr 1fr;
  background:linear-gradient(135deg,#2a2218,#3d3225);
  color:var(--goldL); font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:12.5px; letter-spacing:4px; text-align:center;
}
.matrix-axis-top &gt; div{padding:10px 8px; border-right:1px solid rgba(184,134,11,.25);}
.matrix-axis-top &gt; div:last-child{border-right:0;}
.matrix-grid{
  display:grid; grid-template-columns:1fr 1fr;
  position:relative;
}
.matrix-grid::before{
  content:&quot;&quot;; position:absolute; top:0; bottom:0; left:50%;
  width:1px; background:var(--border); pointer-events:none;
}
.matrix-grid::after{
  content:&quot;&quot;; position:absolute; left:0; right:0; top:50%;
  height:1px; background:var(--border); pointer-events:none;
}
.matrix-cell{
  padding:20px 22px 22px; position:relative;
  display:flex; flex-direction:column; gap:10px;
}
.matrix-cell .q-head{
  display:flex; align-items:center; gap:12px; margin-bottom:6px;
}
.matrix-cell .q-badge{
  flex-shrink:0; width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif; font-weight:700; font-size:16px;
  color:#fff; box-shadow:0 3px 10px rgba(0,0,0,.15);
}
.matrix-cell.q1 .q-badge{background:linear-gradient(135deg,#b8680b,#d4904b);}
.matrix-cell.q2 .q-badge{background:linear-gradient(135deg,#8b2500,#b8441e);}
.matrix-cell.q3 .q-badge{background:linear-gradient(135deg,#4a5c7a,#6a7a96);}
.matrix-cell.q4 .q-badge{background:linear-gradient(135deg,#7a7a3a,#9a9a5a);}
.matrix-cell .q-title{
  font-size:17px; font-weight:700; letter-spacing:2px;
}
.matrix-cell.q1 .q-title{color:#8b5e3c;}
.matrix-cell.q2 .q-title{color:#8B2500;}
.matrix-cell.q3 .q-title{color:#3d5270;}
.matrix-cell.q4 .q-title{color:#5a6f2e;}
.matrix-cell .q-axis-tag{
  display:inline-block; font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:11px; letter-spacing:2px; color:var(--text-muted);
  border:1px solid var(--border); border-radius:10px;
  padding:2px 10px; background:rgba(255,253,247,.6); width:fit-content;
}
.matrix-cell ul{margin:0; padding-left:18px; list-style:none;}
.matrix-cell li{
  color:var(--text2); font-size:14.5px; line-height:1.9;
  margin:4px 0; position:relative; padding-left:14px;
}
.matrix-cell li::before{
  content:&quot;◆&quot;; position:absolute; left:-4px; top:0;
  color:var(--gold); font-size:10px;
}
.matrix-cell li b{color:var(--accent-red);}
.matrix-sum{
  text-align:center; padding:14px 20px;
  background:linear-gradient(135deg,#fdf8e8,#f5e8c6);
  border-top:1px solid var(--border);
  font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:13.5px;
  letter-spacing:3px; color:var(--accent);
}
.matrix-sum b{color:var(--accent-red); letter-spacing:2px;}
@media(max-width:720px){
  .matrix-axis-top{grid-template-columns:1fr;}
  .matrix-axis-top &gt; div{border-right:0; border-bottom:1px solid rgba(184,134,11,.25);}
  .matrix-grid{grid-template-columns:1fr;}
  .matrix-grid::before{display:none;}
}

/* Layers (for 三層次) */
.layers{margin:22px 0;}
.layer{
  display:flex; gap:20px; align-items:flex-start;
  padding:18px 22px; margin-bottom:12px;
  border-radius:10px; background:var(--card); border:1px solid var(--border);
}
.layer-num{
  flex-shrink:0; width:62px; height:62px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif; font-weight:700; font-size:14px;
  color:#fff; letter-spacing:1px; line-height:1.3; text-align:center;
}
.layer-1 .layer-num{background:linear-gradient(135deg,#4a5c7a,#6a7a96);}
.layer-2 .layer-num{background:linear-gradient(135deg,#7a9a7a,#95b094);}
.layer-3 .layer-num{background:linear-gradient(135deg,#b8680b,#d4904b);}
.layer-body{flex:1;}
.layer-title{font-size:18px; font-weight:700; color:var(--accent); margin-bottom:4px; letter-spacing:1.5px;}
.layer-desc{color:var(--text2); font-size:15px; line-height:1.85;}

/* Dualism (火宅 智/愚對比) */
.compare{
  display:grid; grid-template-columns:1fr 1fr; gap:0;
  border-radius:12px; overflow:hidden; margin:18px 0;
  border:1px solid var(--border);
}
.compare &gt; div{padding:18px 22px;}
.compare .wise{background:linear-gradient(135deg,#fdf2e4,#f8e5ca); border-right:1px dashed var(--border);}
.compare .fool{background:linear-gradient(135deg,#e8ede8,#d8e3d8);}
.compare-head{font-weight:700; font-size:16px; margin-bottom:10px; letter-spacing:2px;}
.compare .wise .compare-head{color:var(--accent-red);}
.compare .fool .compare-head{color:#527a53;}
.compare p{font-size:15px; line-height:1.9; color:var(--text2);}

/* Steps chain */
.steps-chain{
  display:flex; flex-wrap:wrap; align-items:stretch; gap:8px;
  padding:16px; background:#fdf8ec; border-radius:10px;
  border:1px dashed var(--border); margin:18px 0;
}
.step{
  flex:1; min-width:130px;
  background:var(--card); border:1.5px solid var(--accentL);
  border-radius:10px; padding:14px 12px; text-align:center;
  position:relative;
}
.step-label{
  display:inline-block; background:var(--gold); color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:11px; letter-spacing:2px;
  padding:2px 10px; border-radius:10px; margin-bottom:8px;
}
.step-title{color:var(--accent); font-weight:700; font-size:15px; margin-bottom:4px;}
.step-desc{color:var(--text-muted); font-size:12.5px; line-height:1.7;}
.chain-arrow{
  align-self:center; color:var(--gold); font-size:20px; font-weight:700;
}

/* Three realms (三乘果位) */
.realms{margin:18px 0;}
.realm{
  display:flex; gap:18px; padding:16px 22px;
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; margin-bottom:10px;
  align-items:flex-start;
}
.realm-stage{
  flex-shrink:0; width:78px; text-align:center;
  padding:10px 6px; border-radius:8px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif; font-weight:700; font-size:14px;
  color:#fff; line-height:1.3;
}
.realm-1 .realm-stage{background:linear-gradient(135deg,#c48a5a,#d4a276);}
.realm-2 .realm-stage{background:linear-gradient(135deg,#8b9d6e,#a8bb87);}
.realm-3 .realm-stage{background:linear-gradient(135deg,#8b5e3c,#b37c4f);}
.realm-body{flex:1;}
.realm-title{font-weight:700; color:var(--accent); font-size:16.5px; margin-bottom:3px; letter-spacing:1.5px;}
.realm-desc{color:var(--text2); font-size:15px; line-height:1.85;}
.realm-desc b{color:var(--accent-red);}

/* Back to top */
#backTop{
  position:fixed; right:20px; bottom:78px; width:44px; height:44px;
  border-radius:50%; border:1px solid var(--border);
  background:var(--card); color:var(--accent); font-size:20px; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.14);
  display:none; z-index:110;
}
#backTop.show{display:flex; align-items:center; justify-content:center;}

/* Footer */
.site-footer{
  background:var(--sbBg); color:#b8a888; padding:34px 26px 30px;
  text-align:center; font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:13px; letter-spacing:2px; line-height:2;
}
.site-footer .ft-title{color:var(--goldL); font-size:15px; margin-bottom:6px; letter-spacing:3px;}
.site-footer .ft-meta{opacity:.65; font-size:12px;}

/* Next link */
.next-link{
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 22px; margin-top:14px;
  background:linear-gradient(135deg,var(--gold),var(--goldL)); color:#fff;
  border-radius:24px; font-family:&quot;Noto Sans TC&quot;,sans-serif; font-size:14px;
  letter-spacing:2px; text-decoration:none; font-weight:600;
  box-shadow:0 3px 12px rgba(184,134,11,.3);
  transition:transform .2s;
}
.next-link:hover{transform:translateX(4px);}

/* Tail verse */
.tail-verse{
  margin:30px auto; max-width:560px; padding:34px 32px;
  background:linear-gradient(135deg,#fdf8e8,#f5e8c6);
  border:1.5px solid var(--gold); border-radius:14px;
  text-align:center; box-shadow:0 4px 18px rgba(184,134,11,.15);
}
.tail-verse .tv-title{color:var(--accent-red); font-size:16px; letter-spacing:4px; margin-bottom:16px; font-weight:700;}
.tail-verse p{
  font-size:22px; color:var(--accent); line-height:2.2; margin:0;
  letter-spacing:4px; font-weight:600;
}

@media(max-width:900px){
  :root{--sbW:0;}
  #sb{transform:translateX(-100%); width:200px;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex; align-items:center; justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:72px 20px 56px;}
  .hero-title{font-size:38px; letter-spacing:4px;}
  .hero-sub{font-size:16px;}
  .ch-body{padding:28px 20px 40px;}
  .ch-head{padding:42px 20px;}
  .ch-name{font-size:26px;}
  .two-col,.three-col,.four-grid,.compare{grid-template-columns:1fr;}
  .preface{padding:26px 22px;}
  h2{font-size:20px;}
}

p, li, div, span, td, th, h1, h2, h3, h4, h5, h6, a,

.classical-text, .classical-text p, .bridge p, blockquote, blockquote p{

  .ch-body, .ch-body p, .ch-body li{font-size:17.5px!important;line-height:1.95!important;}
